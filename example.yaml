# =============================================================================
#    FILE TITLE
# =============================================================================

# ➔ This file handles a combined automation + template sensor package
#    for tracking room presence, generating derived occupancy signals,
#    and exposing lightweight UI elements for dashboards.




# ── AUTOMATION ───────────────────────────────────────────────────────────────
automation:

# ➔ PRESENCE ENTRY AUTOMATION ────────────────────────────────────────────────
  - id: presence_enter
    alias: Presence Enter

    # -- TRIGGER BLOCK --------------------------------------------------------
    trigger:
      - platform: state
        entity_id: binary_sensor.room_motion
        to: "on"

    # -- CONDITION BLOCK ------------------------------------------------------
    condition:
      - condition: state
        entity_id: input_boolean.presence_enabled
        state: "on"

    # -- ACTION BLOCK ---------------------------------------------------------
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.room_occupied

        # ➔ Note for maintainers
        #    This action ensures that when motion is detected and presence
        #    is enabled, the occupied flag is flipped immediately. It does
        #    not set timers or perform delays; those are handled in the
        #    exit automation for clarity.




# ➔ PRESENCE EXIT AUTOMATION ─────────────────────────────────────────────────
  - id: presence_exit
    alias: Presence Exit

    # -- TRIGGER BLOCK --------------------------------------------------------
    trigger:
      - platform: state
        entity_id: binary_sensor.room_motion
        to: "off"
        for:
          minutes: 5

    # -- ACTION BLOCK ---------------------------------------------------------
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.room_occupied

        # ➔ Rationale
        #    A small timeout prevents flicker from rapid motion/no-motion
        #    transitions. This mirrors behaviour in the UI pill cards.




# ── TEMPLATE SENSOR DOMAIN ───────────────────────────────────────────────────
template:

# ➔ OCCUPANCY STATE SENSOR ───────────────────────────────────────────────────
  - sensor:

        # -- SENSOR PROPERTIES ------------------------------------------------
      - name: "Room Occupancy State"
        unique_id: room_occupancy_state

        # -- STATE TEMPLATE ---------------------------------------------------
        state: >
          {% if is_state('input_boolean.room_occupied', 'on') %}
            occupied
          {% else %}
            idle
          {% endif %}

        # -- ATTRIBUTES BLOCK -------------------------------------------------
        attributes:

          # ➔ Timer Values
          #    These attributes store supporting metadata for dashboard
          #    components that require precise timing information.


          duration_active: >
            {{ (now() - states.binary_sensor.room_motion.last_changed).seconds }}

          last_motion: "{{ states.binary_sensor.room_motion.last_changed }}"




# H2: DASHBOARD EXAMPLE USAGE
# H5: UI Example
# H6: This shows how the template sensor and booleans can be used inside
# H6: custom cards to display occupancy state with visual feedback.

lovelace:
  mode: storage
  dashboards:
    presence_test:
      title: Presence
      show_in_sidebar: true
      icon: mdi:account

      cards:

        # H3: OCCUPANCY PILL CARD
        - type: custom:occupancy-pill
          entity: sensor.room_occupancy_state

          # H4: CARD OPTIONS
          variables:
            occupied_color: var(--success-color)
            idle_color: var(--disabled-text-color)
