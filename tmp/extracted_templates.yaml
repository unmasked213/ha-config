      \     }\n\n                      // reset stroke width if value doesn't change\n                      if (input == this.value && (event.type === 'click' || event.type === 'touchend'))\n          \
      \                circle_stroke.style.strokeWidth = 'var(--c-stroke-width)';\n\n                      // on release\n                      if (event.type === 'mouseup' || event.type === 'touchend')\
      \ {\n\n                          // display loader if brightness is 0\n                          if (circle_slider.value == 0 && elt.getElementById('loader')) {\n                              elt.getElementById('loader').style.display\
      \ = 'initial';\n                              elt.getElementById('circle').style.display = 'none';\n                          }\n\n                          // set brightness\n                   \
      \       hass.callService('light', 'turn_on', {\n                              entity_id: entity.entity_id,\n                              brightness_pct: this.value\n                          });\n\
      \                      }\n                  }\n              }\n          }, 0);\n\n          return circle(state, input, unit);\n      }\n\n     /* * * * * * * * * * * * * * * * * *\n      *    \
      \                             *\n      *             PERSON              *\n      *                                 *\n      * * * * * * * * * * * * * * * * * */\n\n      else if (domain === 'person')\
      \ {\n          let time = c => {\n              let s = (c/1e3),\n                  m = (c/6e4),\n                  h = (c/36e5),\n                  d = (c/864e5);\n              return s < 60\n \
      \                 ? parseInt(s) + 's'\n                  : m < 60 ? parseInt(m) + 'm'\n                  : h < 24 ? parseInt(h) + 'h'\n                  : parseInt(d) + 'd';\n          };\n      \
      \    let input = states[variables.retain] === undefined || states[variables.retain].state === 'unavailable'\n                  ? time(Date.now() - Date.parse(entity.last_changed))\n              \
      \    : time(Date.now() - Date.parse(states[variables.retain].state)),\n              unit = ' ';\n          return circle(state, input, unit);\n      }\n\n     /* * * * * * * * * * * * * * * * * *\n\
      \      *                                 *\n      *          BINARY_SENSOR          *\n      *                                 *\n      * * * * * * * * * * * * * * * * * */\n\n      else if (domain\
      \ === 'binary_sensor') {\n          let time = c => {\n              let s = (c/1e3),\n                  m = (c/6e4),\n                  h = (c/36e5),\n                  d = (c/864e5);\n         \
      \     return s < 60\n                  ? parseInt(s) + 's'\n                  : m < 60 ? parseInt(m) + 'm'\n                  : h < 24 ? parseInt(h) + 'h'\n                  : parseInt(d) + 'd';\n\
      \          };\n          let input = states[variables.retain] === undefined || states[variables.retain].state === 'unavailable'\n                  ? time(Date.now() - Date.parse(entity.last_changed))\n\
      \                  : time(Date.now() - Date.parse(states[variables.retain].state)),\n              unit = ' ';\n          return circle(state, input, unit);\n      }\n\n     /* * * * * * * * * * *\
      \ * * * * * * *\n      *                                 *\n      *             CLIMATE             *\n      *                                 *\n      * * * * * * * * * * * * * * * * * */\n\n   \
      \   else if (domain === 'climate') {\n          return circle(state, input, unit);\n      }\n\n     /* * * * * * * * * * * * * * * * * *\n      *                                 *\n      *       \
      \       OTHER              *\n      *                                 *\n      * * * * * * * * * * * * * * * * * */\n\n      else if (variables.state_on) {\n          return circle(state, input, unit);\n\
      \      }\n  }\n]]]        \n"

# ──────────────────────────────────────────────────────────────────────
# TEMPLATE: tilt
# ──────────────────────────────────────────────────────────────────────
tilt:
  variables:
    tilt_enable: |
      [[[
        // disable on macos app, text appears over popup
        if (window.navigator.userAgent.includes("Home Assistant")) {
            return false
        }
        // enable on macos browsers
        else if (window.navigator.userAgent.match(/Macintosh; Intel Mac OS X/i)) {
            return true;
        }
        // default - phones, tablets etc
        return false;
      ]]]
    tilt_options: |
      [[[
        let options = {
            max: 5,
            scale: 1.06,
            glare: true,
            'max-glare': 0.15,
            perspective: 800,
            speed: 800,
            parallax: '25px'
        }
        if (this._config.template.includes('conditional_media')) {
            options.scale = options.scale % parseInt(options.scale) / 2 + parseInt(options.scale);
            options.perspective = options.perspective * 2;
            return options;
        }
        return options;
      ]]]
  custom_fields:
    tilt: "[[[\n  setTimeout(() => {\n      let elt = this.shadowRoot,\n          card = elt.getElementById('card'),\n          tilt = typeof VanillaTilt === 'function';\n\n      if (elt && card && tilt\
      \ && variables.tilt_enable) {\n          VanillaTilt.init(card, variables.tilt_options);\n      } else {\n          setTimeout(() => {\n              if (elt && card && tilt && variables.tilt_enable)\
      \ {\n                  VanillaTilt.init(card, variables.tilt_options);\n              }\n          }, 1000);\n      }\n  }, 0);\n]]]\t\t  \n"

# ──────────────────────────────────────────────────────────────────────
# TEMPLATE: conditional_media
# ──────────────────────────────────────────────────────────────────────
conditional_media:
  aspect_ratio: 1000/996
  template:
  - base
  - base_media
  - icon_play_pause
  variables:
    i: |
      [[[
        if (entity) {
            let data = entity.attributes.data;
            return data === undefined || Math.floor(Math.random() * (data.length - 1)) + 1;
        }
      ]]]
  state_display: |
    [[[
      let horizontalStack = this.getRootNode().host,
          swipeCard = horizontalStack.getRootNode().host,
          gridTitle = swipeCard.getRootNode().querySelector("h1");

      swipeCard.swiper.on("slideChange", () => {
          if (swipeCard.swiper.realIndex === 0) {
              gridTitle.textContent = "Media";
          }
          else if (swipeCard.swiper.realIndex === 1) {
              gridTitle.textContent = "Spelare";
          }
      });

      if (entity) {
          let elt = this.shadowRoot,
              await = setTimeout(marquee, 100),
              data = entity.attributes.data,
              artist = entity.attributes.media_artist,
              title = entity.attributes.media_title;

            if (data !== undefined) {
                var number = data[variables.i].number === undefined && data[variables.i].aired !== undefined
                    ? `(${data[variables.i].aired.split("-")[0]})`
                    : data[variables.i].number === undefined && data[variables.i].aired === undefined
                        ? ' '
                        : data[variables.i].number,
                output = `${data[variables.i].title} ${number}`;
            } else {
                var output = artist === undefined && title !== undefined
                    ? title
                    : title === undefined && artist !== undefined
                        ? artist
                        : title !== undefined && artist !== undefined
                            ? `${artist} - ${title}`
                            : variables.translate_idle;
            }

          function marquee() {
              let state = elt.getElementById("state"),
                  container = elt.getElementById("container");

              if (state && container) {
                  state.innerHTML = output;
                  let ro = new ResizeObserver(entries => {
                      let spacer = "&nbsp;".repeat(3),
                          s = entries[0],
                          c = entries[1],
                          r = s && s.contentRect &&
                              c && c.contentRect &&
                              s.contentRect.width !== 0 &&
                              c.contentRect.width !== 0;

                      if (r && s.contentRect.width < c.contentRect.width) {
                          state.classList.remove("marquee");
                      }
                      else if (r && s.contentRect.width >= c.contentRect.width) {
                          state.innerHTML = `${output} ${spacer} ${output} ${spacer}&nbsp;`;
                          state.classList.add("marquee");
                      }
                  });
                  ro.observe(state);
                  ro.observe(container);
              }
          }
          return output;
      }
      return variables.translate_unknown;
    ]]]
  tap_action:
    action: call-service
    service: media_player.media_play_pause
    service_data:
      entity_id: |
        [[[ return variables.entity_id; ]]]
  styles:
    grid:
    - gap: 0.65%
    name:
    - padding: 0.2vw
    - margin: -0.2vw
    state:
    - padding-bottom: 5.25%
    - max-width: unset
    - overflow: visible
    card:
    - padding: 5.75% 5.25% 0 5.75%
    - border-radius: calc(var(--button-card-border-radius) / 2)
    - background: rgba(115, 115, 115, 0.2) center center/cover no-repeat
    - background-image: |
        [[[
          if (entity) {
            if (variables.is_youtube) {
                return `url(${states[this._config?.triggers_update].state})`;
            } else {
              let data = entity.attributes.data;
              return data && (data[variables.i].fanart || data[variables.i].poster)
                  ? `url("${data[variables.i].fanart}"), url("${data[variables.i].poster}")`
                  : `url("${variables.entity_picture}")`;
            }
          }
        ]]]
    - color: |
        [[[
          return entity === undefined
              ? '#97989c'
              : '#efefef';
        ]]]
    - text-shadow: |
        [[[
          return entity === undefined
              ? 'none'
              : '1px 1px 5px rgba(18, 22, 23, 0.9)';
        ]]]
    custom_fields:
      icon:
      - width: 30%
      - fill: |
          [[[
            return entity && variables.media_on
                ? 'rgba(255, 255, 255, 0.8)'
                : '#9da0a2';
          ]]]
      blur_overlay:
      - display: block
      - position: absolute
      - width: 103.1%
      - height: 103.1%
      - clip-path: |
          inset(74.5% 1.45% 1.45% 1.45% round 0 0 calc(var(--button-card-border-radius) / 2) calc(var(--button-card-border-radius) / 2))
      - backdrop-filter: var(--blur-intensity)
      - -webkit-backdrop-filter: var(--blur-intensity)
      - left: -1.5%
      - bottom: -1.6%
  custom_fields:
    blur_overlay: "[[[\n  setTimeout(() => {\n      let elt = this.shadowRoot,\n          card = elt.getElementById('card'),\n          container = elt.getElementById('container'),\n          blur_overlay\
      \ = elt.getElementById('blur_overlay');\n\n      if (elt && card && container && blur_overlay) {\n          card.insertBefore(blur_overlay, container);\n      }\n    }, 0);\n  return ' ';\n]]]\t\n"

# ──────────────────────────────────────────────────────────────────────
# TEMPLATE: settings
# ──────────────────────────────────────────────────────────────────────
settings:
  variables:
    entity_tablet: switch.galaxy_tab_a_screensaver
    entity_browser_mod: media_player.tablet
    translate_unknown: Unknown
    translate_idle: Inactive
    translate_home: 'Yes'
    translate_not_home: 'No'
    translate_available: Available
    translate_no_updates: No updates
    translate_update_available: Update available
    translate_updates_available: Updates available
    translate_on: 'On'
    translate_off: 'Off'
    translate_cool: Cool
    translate_fan_only: Fan only
    translate_playing: Playing
    translate_paused: Paused
    translate_standby: Standby

# ──────────────────────────────────────────────────────────────────────
# TEMPLATE: base
# ──────────────────────────────────────────────────────────────────────
base:
  template:
  - settings
  - tilt
  - extra_styles
  variables:
    state_on: |
      [[[ return ['on', 'home', 'cool', 'fan_only', 'playing', 'unlocked'].indexOf(!entity || entity.state) !== -1; ]]]
    state: |
      [[[ return !entity || entity.state; ]]]
    entity_id: |
      [[[ return !entity || entity.entity_id; ]]]
    entity_picture: |
      [[[ return !entity || entity.attributes.entity_picture; ]]]
    timeout: |
      [[[ return !entity || Date.now() - Date.parse(entity.last_changed); ]]]
    is_youtube: |
      [[[
        let is_youtube = entity?.attributes?.app_id === 'com.google.ios.youtube',
            sensor = this?._config?.triggers_update,
            media_title = entity?.attributes?.media_title,
            watching_title = states[sensor]?.attributes?.title;
        if (is_youtube && media_title === watching_title) {
            return true;
        }
      ]]]
  aspect_ratio: 1/1
  show_state: true
  show_icon: false
  state_display: |
    [[[
      const stateDict = {
        'on': variables.translate_on,
        'off': variables.translate_off,
        'cool': variables.translate_cool,
        'fan_only': variables.translate_fan_only,
      };
      if (variables.state === true) return variables.translate_unknown;
      return stateDict[variables.state];
    ]]]
  tap_action:
    ui_sound_tablet: |
      [[[
        let screensaver = states[variables.entity_tablet] === undefined ||
            states[variables.entity_tablet].state;

        if (variables.state === 'off' && screensaver === 'off') {
            hass.callService('media_player', 'play_media', {
                entity_id: variables.entity_browser_mod,
                media_content_id: '/local/sound/on.m4a',
                media_content_type: 'music'
            });
        }
        if (variables.state_on && screensaver === 'off') {
            hass.callService('media_player', 'play_media', {
                entity_id: variables.entity_browser_mod,
                media_content_id: '/local/sound/off.m4a',
                media_content_type: 'music'
            });
        }
      ]]]
    card_bounce: |
      [[[
        // add animation
        if (this.getElementsByTagName("style").length === 0) {

            // phone condition
            let mq = window.matchMedia('(max-width: 800px)').matches;

            let style = document.createElement('style');

            style.innerHTML = `
                @keyframes card_bounce {
                    0%   { transform: scale(1); }
                    10%  { transform: scale(${ mq ? '0.92' : '0.94' }); }
                    25%  { transform: scale(1); }
                    30%  { transform: scale(${ mq ? '0.96' : '0.98' }); }
                    100% { transform: scale(1); }
                }
            `;

            this.appendChild(style);
        }

        // duration
        let duration = 800;

        // animate
        this.style.animation = `card_bounce ${duration}ms cubic-bezier(0.22, 1, 0.36, 1)`;

        // reset
        window.setTimeout(() => { this.style.animation = "none"; }, duration + 100)
      ]]]
    action: none
    haptic: success
  double_tap_action:
    action: none
    haptic: medium
  hold_action:
    action: none
    haptic: medium
  styles:
    grid:
    - grid-template-areas: |
        "icon  circle"
        "n     n"
        "s     s"
    - grid-template-columns: repeat(2, 1fr)
    - grid-template-rows: auto repeat(2, min-content)
    - gap: 1.3%
    - align-items: start
    - will-change: transform
    name:
    - justify-self: start
    - line-height: 119%
    - text-overflow: unset
    - white-space: unset
    - word-break: break-word
    state:
    - justify-self: start
    - line-height: 115%
    - text-overflow: unset
    - white-space: unset
    - word-break: break-word
    card:
    - font-size: 100%
    - border-radius: 10%
    - cursor: pointer
    - border-top: none
    - background: linear-gradient(to top, rgba(0,0,0,0.13), rgba(0,0,0,0.05))
    - -webkit-tap-highlight-color: rgba(0,0,0,0)
    - transition: 1s
    - --mdc-ripple-color: |
        [[[
          return variables.state_on
              ? 'rgb(0, 0, 0)'
              : '#97989c';
        ]]]
    - color: |
        [[[
          return variables.state_on
              ? '#4b5254'
              : '#97989c';
        ]]]

# ──────────────────────────────────────────────────────────────────────
# TEMPLATE: loader
# ──────────────────────────────────────────────────────────────────────
loader:
  custom_fields:
    loader: |
      <img src="/local/loader.svg" width="100%">
  tap_action:
    loader: |
      [[[
        if (entity) {
            let elt = this.shadowRoot,
                loader = (id, style, timeout) => {
                  elt.getElementById(id) && (elt.getElementById(id).style.display = style,
                    window.setTimeout(() => {
                      elt.getElementById('loader').style.display = 'none'
                    }, 20000))
                };
            loader('circle', 'none', 'initial'),
            loader('loader', 'initial', 'none');
        }
      ]]]
  styles:
    custom_fields:
      loader:
      - display: none
      - top: -6%
      - right: -3.5%
      - width: 52%
      - position: absolute
      - opacity: 0.5
      - pointer-events: none
      - filter: |
          [[[
            return variables.state_on
                ? 'none'
                : 'invert(1)';
          ]]]

# ──────────────────────────────────────────────────────────────────────
# TEMPLATE: night_alert
# ──────────────────────────────────────────────────────────────────────
night_alert:
  template:
  - base
  - circle
  triggers_update: all
  card_mod:
    style: "div#state.ellipsis {\n  {% if is_state(config.entity, 'on') %}\n  color: var(--red);    \n  {% elif is_state(config.entity, 'off') %}\n  color: var(--contrast6);  \n  {% else %}\n  color: var(--orange)\
      \ !important;\n  {% endif %}      \n}  \ndiv#name.ellipsis {\n  {% if is_state(config.entity, 'on') %}\n  color: var(--contrast18) !important;\n  {% else %}\n  color: var(--contrast8) !important;\n\
      \  {% endif %}         \n}    \n"
  styles:
    card:
    - border-top: none
    - --c-stroke-color-on: var(--red)
    - --c-stroke-color-off: var(--contrast4)
    - --c-fill-color-on: none
    - --c-fill-color-off: none
    - --c-font-color: "[[[\n  return variables.state_on\n      ? 'var(--contrast16)'\n      : 'var(--contrast8)';\n]]]    \n"
    - animation: "[[[\n  return variables.state_on\n      ? 'alert_on 1s ease-in-out infinite'\n      : 'alert_off 50s ease-in-out ';\n]]]        \n"
  extra_styles: "@keyframes alert_on {\n  0% {\n    box-shadow: none\n  }\n  50% {\n    box-shadow: 0 0 300rem 100rem var(--red)\n  }   \n  100% {\n    box-shadow: none\n  }\n }         \n@keyframes alert_off\
    \ {\n  0% {\n    box-shadow: 0 0 300rem 100rem var(--red)\n  }\n  3% {\n    box-shadow: 0 0 8rem 0.8rem var(--red)\n  }       \n  10% {\n    box-shadow: 0 0 8rem 0.8rem var(--orange)\n  }   \n  50%\
    \ {\n    box-shadow: 0 0 8rem 0.8rem var(--orange-dark)\n  }    \n  98% {\n    box-shadow: 0 0 8rem 0.8rem var(--orange-dark)\n  }     \n  99% {\n    box-shadow: 0 0 8rem 0.8rem var(--green)\n  }  \
    \       \n  100% {\n    box-shadow: none\n  }\n }          \n"
  state_display: "[[[\n  if (entity.state == 'on') {\n      return 'Motion detected';\n  }\n  if (entity.state == 'off') {\n      return 'Clear';\n  }\n]]]         \n"

