# | START: configuration.yaml
# |  PATH: /config/configuration.yaml


#  ╔═════════════════════════════════════════════════════════════════════════╗
#  ║     HOME ASSISTANT CONFIGURATION                                        ║
#  ╚═════════════════════════════════════════════════════════════════════════╝

#  • Minimal loader. All domain logic lives in packages/.
#  • Defines globals, includes, frontend mode, recorder policy, and integrations.


# ── CORE ────────────────────────────────────────────────────────────────────
default_config:

homeassistant:
  name:                                     "Home"
  unit_system:                              "metric"
  temperature_unit:                         "C"
  currency:                                 "GBP"
  time_zone:                                "Europe/London"
  latitude:                                 !secret home_latitude
  longitude:                                !secret home_longitude
  elevation:                                !secret home_elevation
  packages:                                 !include_dir_named packages

  allowlist_external_dirs:
    -                                       /config
    -                                       /config/www
    -                                       /config/www/whatsapp_histories

  media_dirs:
    ai_generated:                           /media/ai_generated
    local:                                  /media
    www:                                    /config/www




# ── INCLUDES ────────────────────────────────────────────────────────────────
automation:                                 !include automations.yaml
scene:                                      !include scenes.yaml
script:                                     !include scripts.yaml




# ── FRONTEND ────────────────────────────────────────────────────────────────
lovelace:
  mode:                                     yaml
  resources:                                !include ui/ui_lovelace_resources.yaml

frontend:
  themes:                                   !include_dir_merge_named themes/
  extra_module_url:                         !include ui/frontend_extra_modules.yaml




# ── RECORDER ────────────────────────────────────────────────────────────────
recorder:
  purge_keep_days:                          7
  auto_purge:                               true
  commit_interval:                          30
  exclude:
    entity_globs:
      -                                     sensor.ha_text_ai_*
      -                                     sensor.mpm_*
      -                                     sensor.current_time_*
      -                                     sensor.mqtt_*
      -                                     sensor.system_monitor_network_*
      -                                     sensor.*_signal
      -                                     sensor.*_rssi
      -                                     sensor.*_lqi
      -                                     sensor.*_quality
      -                                     sensor.*_link_quality
      -                                     sensor.*_battery_plus
      -                                     binary_sensor.*_vibration*
    entities:
      -                                     binary_sensor.door_office
      -                                     binary_sensor.door_bedroom
      -                                     binary_sensor.bed_state_asleep_likely
      -                                     automation.update_message_index
      -                                     timer.message_cycle
      -                                     input_number.message_index
      -                                     input_text.current_message
      -                                     input_text.next_message
      -                                     event.repair
      -                                     sensor.ha_server_snapshot
    event_types:
      -                                     call_service




# ── LOGGER ──────────────────────────────────────────────────────────────────
logger:
  default:                                  warning
  logs:
    custom_components.powercalc:            error
    custom_components.browser_mod:          error
    homeassistant.components.websocket_api: error
    homeassistant.helpers.template:         error




# ── HTTP ────────────────────────────────────────────────────────────────────
http:
  use_x_forwarded_for:                      true
  trusted_proxies:
    -                                       127.0.0.1
    -                                       ::1
    -                                       172.17.0.1
    -                                       172.30.33.0/24
  ip_ban_enabled:                           false






# ── INTEGRATIONS ────────────────────────────────────────────────────────────
system_health:
lovelace_gen:
python_script:
powercalc:
whatsapp:
browser_mod:
prompt_manager:


panel_custom:
  - name:                                   material-you-panel
    url_path:                               material-you-configuration
    sidebar_title:                          Material You Utilities
    sidebar_icon:                           mdi:material-design
    module_url:                             /hacsfiles/material-you-utilities/material-you-utilities.min.js




# ── SENSORS ─────────────────────────────────────────────────────────────────
#  • Relates to my custom card, my-chat-bubble. Working on a fix that doesn't
#    require this sensor  at all. Until then, this must be defined at
#    configuration.yaml level for the card to recieve messages in a timely
#    manner. 
sensor:
  - platform:                               chatreader
    scan_interval:                          5




# |   END: configuration.yaml
