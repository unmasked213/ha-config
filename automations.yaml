- id: '1697824736132'
  alias: TTS - Activity Alerts
  description: Announces activity around the house at specific times, including door
    openings and presence detection.
  triggers:
  - trigger: state
    entity_id: binary_sensor.door_house
    to: 'on'
    id: door_house
  - trigger: state
    entity_id: binary_sensor.presence_floor_02
    from: 'off'
    to: 'on'
    id: presence_floor_02
  actions:
  - action: media_player.volume_set
    target:
      entity_id: media_player.sonos_speaker
    data:
      volume_level: 0.05
  - choose:
    - conditions:
      - condition: trigger
        id: door_house
      sequence:
      - action: tts.speak
        target:
          entity_id: tts.openai_gpt_4o_mini_tts
        data:
          media_player_entity_id: media_player.sonos_speaker
          message: Hey. The house door just opened.
          cache: true
    - conditions:
      - condition: trigger
        id: presence_floor_02
      - condition: template
        value_template: '{{ (now() - trigger.from_state.last_changed).total_seconds()
          > 600 }}'
      sequence:
      - action: tts.speak
        target:
          entity_id: tts.openai_gpt_4o_mini_tts
        data:
          media_player_entity_id: media_player.sonos_speaker
          message: Hey. Upper stairs active.
          cache: true
  mode: single
