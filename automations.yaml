          title: Message to Cam
          message: '{{ final_message }}

            — via {{ states[sat_entity].name if sat_entity in states else ''Assist''
            }} (heard: "{{ source_sentence }}")'
          notification_id: msg_cam_{{ now().timestamp() | int }}
    - conditions: []
      sequence:
      - alias: Ask for the message text and listen
        continue_on_error: true
        action: assist_satellite.ask_question
        target:
          entity_id: '{{ sat_entity }}'
        data:
          question: What is the message for Cam?
        response_variable: answer
      - variables:
          final_message: '{{ (answer.sentence | default('''')) | trim }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ final_message | length > 0 }}'
          sequence:
          - action: persistent_notification.create
            data:
              title: Message to Cam
              message: '{{ final_message }}

                — via {{ states[sat_entity].name if sat_entity in states else ''Assist''
                }} (heard: "{{ source_sentence }}")'
              notification_id: msg_cam_{{ now().timestamp() | int }}
          - set_conversation_response: Saved your message for Cam.
        default:
        - set_conversation_response: I didn't hear the message. Please try again.
        - action: persistent_notification.create
          data:
            title: Message to Cam
            message: No message captured.
            notification_id: msg_cam_error_{{ now().timestamp() | int }}
  mode: single
  max_exceeded: silent
  variables:
    vsat_default: assist_satellite.living_room_voice_assistant
    sat_entity: '{{ trigger.satellite_id | default(vsat_default) }}'
    direct_message: '{{ (trigger.slots.message | default('''')) | trim }}'
    source_device_id: '{{ trigger.device_id | default('''') }}'
    source_sentence: '{{ trigger.sentence | default('''') }}'
