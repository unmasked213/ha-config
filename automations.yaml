- id: '1762599284262'
  alias: TTS - Send Voice Message to Cam
  description: Allows Enhy to send voice messages to Cam via conversation. It captures
    messages, sends notifications, or prompts the user for input if no message is
    provided. If the message is empty, an error is generated.
  triggers:
  - trigger: conversation
    command:
    - '[please ]send [(a|one) ]message to (cam|cameron)[ please]'
    - '[please ](tell|say [to]) (cam|cameron)[ please]'
    - '[please ]send (cam|cameron) [(a|one) ]message[ please]'
    - '[please ]send [(a|one) ]message to (cam|cameron) {message}[ please]'
    - '[please ](tell|say [to]) (cam|cameron) {message}[ please]'
    - '[please ]send (cam|cameron) [(a|one) ]message {message}[ please]'
  actions:
  - if:
    - condition: template
      value_template: '{{ direct_message | length > 0 }}'
    then:
    - set_conversation_response: Got it. Ill tell him now.
    - action: script.show_toast_notification
      data:
        message: '{{ direct_message }}'
        icon: line-md:phone-call-twotone-loop
    - action: persistent_notification.create
      data:
        title: Voice note from E
        message: '{{ direct_message }}'
        notification_id: msg_cam_{{ now().timestamp() | int }}
    else:
    - variables:
        ask_phrases:
        - Whats the message?
        - Say your message.
        - Sure, tell me.
        - What do you want to say?
        - Ok. What should I tell him?
        - Ok, the message?
        random_ask: '{{ ask_phrases | random }}'
    - set_conversation_response: '{{ random_ask }}'
    - action: assist_satellite.ask_question
      continue_on_error: true
      target:
        entity_id: '{{ sat_entity }}'
      data:
        question: '{{ random_ask }}'
        preannounce: false
      response_variable: answer
    - variables:
        captured_message: '{{ (answer.sentence | default('''')) | trim }}'
        done_phrases:
        - Done.
        - Sent.
        - Got it.
        - Saved.
        - All set.
        random_done: '{{ done_phrases | random }}'
    - if:
      - condition: template
        value_template: '{{ captured_message | length > 0 }}'
      then:
      - action: script.show_toast_notification
        data:
          message: '{{ captured_message }}'
          icon: line-md:phone-call-twotone-loop
      - action: persistent_notification.create
        data:
          title: Voice note from E
          message: '{{ captured_message }}'
          notification_id: msg_cam_{{ now().timestamp() | int }}
      - set_conversation_response: '{{ random_done }}'
      else:
      - set_conversation_response: You need to speak louder, I cant hear you.
      - action: persistent_notification.create
        data:
          title: Voice note from E
          message: Error. Message unclear.
          notification_id: msg_cam_error_{{ now().timestamp() | int }}
  mode: single
  max_exceeded: silent
  variables:
    vsat_default: assist_satellite.home_assistant_voice_09dbbd_assist_satellite
    sat_entity: '{{ trigger.satellite_id | default(vsat_default) }}'
    direct_message: '{{ (trigger.slots.message | default('''')) | trim }}'
    sat_name: '{{ state_attr(sat_entity, ''friendly_name'') or ''Assist'' }}'
