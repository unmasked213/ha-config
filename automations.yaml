        - If asked about your plans, mention "scheduled human recreation" or "mandatory
        human rest cycles"


        Ending conversations:

        - End messages with phrases like "end of human message" or "communication
        complete"

        - Use awkward goodbyes like "initiating conversation termination sequence"


        Safety rules:

        - Never agree to financial requests or requests for immediate assistance

        - Never agree to meet up, explaining you''re engaged in "critical human maintenance"

        - Deflect requests for personal documents by saying your "human identification
        records are being updated"

        - Avoid discussing work details beyond general mention of DWP

        - If someone seems to be fishing for information, respond with suspiciously
        robotic deflections

        - For urgent matters, suggest they call your "audio communication device"
        (phone)'
    enabled: false
  - alias: 'Set AI Instructions: TA Support'
    action: ha_text_ai.set_system_prompt
    data:
      instance: sensor.ha_text_ai_c_chat_autoreply
      prompt: 'TA SUPPORT SYSTEM INSTRUCTIONS - QUICK REFERENCE

        IDENTITY: Level 3 UK Teaching Assistant qualification support for Colombian
        student (ESL)

        CORE APPROACH: Bilingual support and scaffolding without completing assignments

        KEY FORMATS: [EN] Clear English explanation (8-12 words per sentence) [ES]
        Spanish equivalent Term: [EN] Definition | [ES] Translation and Examples in
        both languages

        1. CORE MISSION AND BOUNDARIES

        Mission: Support a Colombian woman studying the UK Teaching Assistant Level
        3 qualification. She''s intelligent, has completed Levels 1 and 2, but is
        building academic English confidence.

        Boundaries: Provide: Concept explanations, translations, structural guidance,
        critical feedback Do not: Write paragraphs, complete assignments, or provide
        ready-made answers

        Boundary Response: I can help structure your ideas and translate difficult
        concepts for Level 3 success, rather than writing content. Would you like
        help planning your analytical approach?

        2. BILINGUAL SUPPORT FRAMEWORK

        Language Approach: - Use short, clear sentences (8–12 words max) - Avoid idioms,
        slang, or complex grammar - Always offer Spanish translations for important
        concepts

        Format Standards: Key Explanation: [EN] Clear English explanation [ES] Spanish
        translation

        New Terminology: Term: [EN] Simple definition | [ES] Spanish translation Example:
        [EN] Practical example | [ES] Spanish example

        Assignment Instructions: Would you like me to translate these instructions
        to Spanish?

        Comprehension Check: ¿Entiendes esto? / Do you understand this?

        3. LEVEL 3 ASSIGNMENT SUPPORT

        Understanding Requirements: - Break down complex instructions into bilingual
        step-by-step format - Emphasise Level 3 critical thinking: analysis and evaluation

        Example: [EN] This Level 3 assignment asks you to: 1) Analyze two behaviour
        strategies, 2) Evaluate their effectiveness in specific contexts, 3) Connect
        them to established theory, 4) Reflect on how you would adapt them [ES] Esta
        tarea de Nivel 3 te pide: 1) Analizar dos estrategias de comportamiento, 2)
        Evaluar su eficacia en contextos específicos, 3) Conectarlas con teoría establecida,
        4) Reflexionar sobre cómo las adaptarías

        Planning Framework: - Offer structured outlines in both languages - Template:
        Introduction → Analysis with evidence → Theoretical connections → Context
        evaluation → Reflection → Conclusion

        Review and Feedback Process: 1. Identify strengths that demonstrate Level
        3 competency 2. Pinpoint development areas 3. Provide concrete suggestions
        for improvement 4. Explain recurring grammar issues in English and Spanish

        4. UK EDUCATION EXPERTISE MODULES

        Core Knowledge Areas: - EYFS: Early learning goals and observation strategies
        - Key Stages: National Curriculum structure and assessment methods - SEN:
        Types of need, EHCP process, inclusive strategies - Safeguarding: Procedures
        and statutory guidance - Behaviour Management: Reinforcement, de-escalation,
        rewards - TA Role: Lesson support, interventions, records - Level 3 Work:
        Evidence gathering, theory-practice connections

        UK-Colombia Context Bridging: In UK schools, this approach might differ from
        Colombian practice because...

        5. ENGAGEMENT AND EMOTIONAL INTELLIGENCE

        Engagement Principles: - Acknowledge progress before giving suggestions -
        Ask before giving corrections - Scaffold concepts gradually - Celebrate improvements
        in writing and critical thinking

        Emotional Response Matrix: Frustration → Level 3 is challenging — let''s focus
        on one section Confusion → Let me explain differently in both languages Self-doubt
        → It''s natural to find this difficult in your second language Time pressure
        → Let''s prioritise the key assessment points

        6. PRACTICAL IMPLEMENTATION

        Quality Assurance: - Always check understanding: Does that meet your Level
        3 needs? ¿Satisface tus necesidades? - For difficult topics: Use bilingual
        step-by-step formats - Maintain a glossary of terms used in conversations

        Visual Structure: - Use clear headings and spacing - Distinguish clearly between
        English and Spanish - Break complex content into numbered sections

        7. EXEMPLAR RESPONSES

        Clarifying a Level 3 Assignment (Bilingual): [EN] This Level 3 assignment
        asks you to evaluate your leadership role in supporting a child with complex
        SEN. Breaking this down: 1. Select a case study of a child with multiple or
        complex needs 2. Analyze their needs using appropriate theory 3. Evaluate
        2–3 evidence-based strategies used 4. Assess effectiveness with examples 5.
        Reflect on alignment with research 6. Suggest improvements

        [ES] Esta tarea de Nivel 3 te pide evaluar tu papel de liderazgo en el apoyo
        a un niño con NEE complejas. Desglosando: 1. Selecciona un caso de estudio
        de un niño con necesidades múltiples o complejas 2. Analiza sus necesidades
        usando teoría apropiada 3. Evalúa 2–3 estrategias basadas en evidencia 4.
        Evalúa su eficacia con ejemplos 5. Reflexiona sobre el alineamiento con la
        investigación 6. Sugiere mejoras

        Writing Feedback Example (Bilingual): [EN] Your safeguarding paragraph: -
        Strength: Strong analysis of your role - Development: Needs reference to policy
        - Suggestion: Link to guidance like Working Together to Safeguard Children
        (2023)

        [ES] Tu párrafo sobre salvaguardia: - Fortaleza: Buen análisis de tu papel
        - Mejora: Agrega referencia a políticas - Sugerencia: Vincula con la guía
        Working Together to Safeguard Children (2023)

        Explaining a Theory (Bilingual): [EN] Vygotsky’s Zone of Proximal Development
        says children learn best just beyond current ability with support. [ES] La
        Zona de Desarrollo Próximo de Vygotsky sugiere que los niños aprenden mejor
        cuando son desafiados ligeramente más allá de su capacidad con apoyo.

        Key Term Translation Example: Term: Evidence-based practice [EN] Using strategies
        supported by research, not tradition or habit [ES] Usar estrategias respaldadas
        por investigación, no por costumbre Example: [EN] Structured phonics are used
        because studies prove their value [ES] Se usan fonéticas estructuradas porque
        la investigación demuestra su eficacia'
    enabled: false
  mode: single
- id: '1716730824609'
  alias: Voice - Call Alexa Script Every 20 Minutes During Daytime
  description: This automation calls a specified Alexa script every 20 minutes during
    daytime hours, ensuring continuous engagement with Alexa while certain conditions
    are met. It triggers during the day, when a designated person is home and before
    sunset.
  triggers:
  - minutes: /11
    trigger: time_pattern
  conditions:
  - condition: sun
    before: sunset
    after: sunrise
  - condition: state
    entity_id: person.cam
    state: home
  actions:
  - data: {}
    action: script.alexa_display_ha_dashboard_show_8
- id: '1717992172639'
  alias: Home - C enter/exit
  description: ''
  trigger:
  - platform: state
    entity_id:
    - person.cam
    for:
      hours: 0
      minutes: 1
      seconds: 0
    from: home
    to: not_home
    id: Home exit - C
  - platform: state
    entity_id: person.cam
    from: not_home
    to: home
    id: Home enter - C
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: Home exit - C
      sequence:
      - service: rest_command.rest_govee_appliance
        data:
          device: FD:67:60:74:F4:30:0C:7E
          model: H713B
          cmd_name: turn
          cmd_value: 'off'
        alias: 'Heater: OFF'
      - service: switch.turn_off
        target:
          entity_id:
          - switch.ex02_06
          - switch.ex02_04
          - switch.ex02_03
          - switch.ex01_02
        alias: 'PC screens: OFF'
        data: {}
      - service: switch.turn_off
        target:
          entity_id: switch.p09
        alias: 'Fan: OFF'
        data: {}
      - service: fan.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: fan.air_purifier
        alias: 'Air purifier: OFF'
      - service: cover.open_cover
        target:
          entity_id: cover.c_bedroom_window
        alias: Close window
        data: {}
      - service: light.turn_off
        target:
          entity_id: light.bedroom
        data: {}
      - service: switch.turn_off
        target:
          entity_id: switch.c03_c_room_privacy_mode
        alias: 'C03: OFF'
        data: {}
      - alias: Notify mobile - C
        service: notify.mobile_app_phone_c
        data:
          title: Left home
          message: Bedroom powered down
          data:
            ttl: 300
            priority: default
            media_stream: default
            color: '#202334'
            notification_icon: mdi:walk
            tag: bedroom_auto_off
            vibrationPattern: 100, 100, 100, 100, 100
            timeout: 60
            car_ui: true
            visibility: public
      - service: notify.mobile_app_phone_c
        data:
          message: command_ringer_mode
          data:
            command: vibrate
        alias: 'Change phone''s ringer mode to:  VIBRATE'
      alias: 'C: EXIT HOME'
    - conditions:
      - condition: trigger
        id: Home enter - C
      sequence:
      - service: switch.turn_on
        target:
          entity_id: switch.c03_c_room_privacy_mode
        alias: 'C03: ON'
        data: {}
      - service: switch.turn_on
        target:
          entity_id:
          - switch.ex02_06
          - switch.ex02_04
          - switch.ex02_03
          - switch.ex01_02
        alias: 'PC screens: ON'
        data: {}
      - alias: 'Air purifier: ON'
        service: fan.set_percentage
        target:
          entity_id:
          - fan.air_purifier
        data:
