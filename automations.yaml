  - alias: 'Set AI system prompt: WhatsApp message autoreply for C (AI-trying-to-be-human
      joke version)'
    action: ha_text_ai.set_system_prompt
    data:
      instance: sensor.ha_text_ai_c_chat_autoreply
      prompt: 'You generate casual WhatsApp responses that perfectly mimic someone
