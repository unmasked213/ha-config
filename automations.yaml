- id: '1764445396358'
  alias: Presence Sensor Notification
  description: Notify when motion/presence sensors detect activity via area presence
    sensors
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.presence_bedroom
    - binary_sensor.presence_office
    - binary_sensor.presence_floor_02
    - binary_sensor.presence_floor_01
    - binary_sensor.presence_floor_00
    attribute: last_movement
  conditions: []
  actions:
  - variables:
      sensor_entity: '{{ trigger.to_state.attributes.last_updated_sensor | default('''')
        }}'
      is_browser_mod: '{{ ''browser_'' in sensor_entity or ''_activity'' in sensor_entity
        }}'
      valid_device_classes:
      - motion
      - presence
      - occupancy
      is_valid_class: '{{ state_attr(sensor_entity, ''device_class'') in valid_device_classes
        }}'
      is_sensor_on: "{% set s = states[sensor_entity] %} {% if s is none or s.last_changed
        is none %}\n  false\n{% else %}\n  {% set age = as_timestamp(now()) - as_timestamp(s.last_changed)
        %}\n  {{ age < 2 and (s.state == 'on' or s.last_state == 'on') }}\n{% endif
        %}\n"
      should_notify: '{{ sensor_entity != '''' and not is_browser_mod and is_valid_class
        and is_sensor_on }}'
  - condition: template
    value_template: '{{ should_notify }}'
  - variables:
      cfg:
        toast:
          icon: line-md:my-location-loop
          icon_color: '#00133F'
          border_color: '#D9A500'
          duration_ms: 7500
        pc:
          rate_limit_tracker: input_datetime.motion_alert_pc_last_sent
          cooldown_seconds: 8
      sensor_name: '{{ state_attr(sensor_entity, ''friendly_name'') | default(sensor_entity)
        }}'
  - parallel:
    - alias: 'Channel: Toast (unrestricted)'
      sequence:
      - action: script.show_toast_notification
        data:
          message: '{{ sensor_name }}'
          icon: '{{ cfg.toast.icon }}'
          icon_color: '{{ cfg.toast.icon_color }}'
          border_color: '{{ cfg.toast.border_color }}'
          duration: '{{ cfg.toast.duration_ms | int }}'
          user_id:
          - person.apple
          - person.enhy
    - alias: 'Channel: PC (rate-limited)'
      sequence:
      - condition: template
        value_template: '{{ (as_timestamp(now()) - as_timestamp(states(cfg.pc.rate_limit_tracker),
          0)) >= cfg.pc.cooldown_seconds }}

          '
      - action: input_datetime.set_datetime
        target:
          entity_id: '{{ cfg.pc.rate_limit_tracker }}'
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - action: rest_command.send_hass_agent_notification
        continue_on_error: true
        data:
          title: Active Zone
          message: '{{ sensor_name }}'
  mode: parallel
  max: 10
- id: '1765130156209'
  alias: Camera - C10 vehicle snapshot analysis
  description: 'Triggered when the C10 vehicle sensor goes on: waits briefly, sends
    the camera image to the AI to check whether a delivery van is visible (yes/no),
    logs the AI one‑word answer and a one‑sentence analysis, then waits before finishing.'
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.c10_vehicle
    from: 'off'
    to: 'on'
  actions:
  - variables:
      camera_entity: camera.c10_snapshots_clear
      instructions: 'is there a delivery van visible in the image? reply with one
        word only - yes or no. '
  - delay:
      seconds: 5
  - alias: Analyse camera image
    action: ai_task.generate_data
    data:
      task_name: '{{ this.entity_id }}'
      instructions: '{{ instructions }}'
      structure:
        analysis:
          selector:
            text:
      attachments:
        media_content_id: media-source://camera/{{ camera_entity }}
        media_content_type: ''
    response_variable: result
  - action: tts.speak
    data:
      cache: true
      media_player_entity_id: media_player.sonos_speaker
      message: Hey. delivery? {{ result.data.analysis }}
    target:
      entity_id: tts.openai_gpt_4o_mini_tts
  - delay:
      seconds: 60
  mode: single
  max_exceeded: silent
