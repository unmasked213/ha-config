          - type: custom:bubble-card
            card_type: separator
            name: Lights
            card_layout: large
            styles: |
              .bubble-name {
                color: var(--contrast20, var(--primary-text-color, rgba(255, 255, 255, 0.9))) !important;
                font-size: 0.95em !important;
                font-weight: 400 !important;
                letter-spacing: 1.4px !important;
                padding-left: 12px;
                font-family: Ubuntu, sans-serif;
                text-transform: capitalize;
              }
              .bubble-icon {
                display: none;
              }
              .bubble-line {
                background-color: var(--contrast6, var(--divider-color, rgba(0, 0, 0, 0.1)));
                opacity: 1;
                height: 1px;
              }
              ha-card {
                margin-bottom: -2px !important;
              }
          - type: custom:gap-card
            height: 10
          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - options:
                    type: custom:bubble-card
                    card_type: button
                    button_type: slider
                    columns: 2
                    rows: 2
                    show_name: true
                    show_attribute: false
                    attribute: brightness
                    styles: |
                      .name {
                        color:  var(--primary-text-color) !important;
                        font-size: 0.8em !important;
                        font-weight: 400 !important;
                        letter-spacing: 1px !important;
                        text-transform: capitalize;
                      }
                      .bubble-button-card-container {
                        background: rgba(255, 255, 255, 0.04) !important;
                      }
                      .bubble-sub-button-1 {
                        opacity: 0.75 !important;
                      }
                    slider_live_update: false
                    card_layout: normal
                    sub_button:
                      - entity: this.entity_id
                        show_background: false
                        icon: mdi:dots-vertical
                        tap_action:
                          action: fire-dom-event
                          browser_mod:
                            service: browser_mod.popup
                            data:
                              title: Light Control
                              style: >
                                --popup-min-width: 400px;
                                --tablet-popup-header-color: rgba(0, 0, 0,
                                0) !important; --popup-background-color:
                                rgba(0, 0, 0, 0); --popup-border-width: 0;
                              card_mod:
                                style:
                                  .: |
                                    ha-dialog-header {
                                      position: relative !important;
                                      color: rgba(101, 101, 128, 0.5) !important;
                                    }
                                    ha-dialog-header ha-icon-button {
                                      color: rgba(101, 101, 128, 0.8) !important;
                                      position: absolute !important;
                                      right: 16px !important;
                                      top: 50% !important;
                                      transform: translateY(-50%) !important;
                                    }
                              content:
                                type: custom:more-info-card
                                entity: this.entity_id
                                card_mod:
                                  style:
                                    more-info-content$ more-info-light $ ha-more-info-state-header$: |
                                      p {
                                        display: none;
                                      }
                                    more-info-content$ more-info-light$ div$ light-color-rgb-picker$: |
                                      .color-container {
                                        native-color-picker {display: none};
                                      }
                                    more-info-content$ more-info-light$: |
                                      div {
                                        display: none;
                                      }
                                      .controls {
                                        .color-container
                                        {
                                          display: none;
                                        }
                                        ha-state-control-light-brightness {
                                          display: block;
                                        }
                                        ha-icon-button-group { display: block;}
                                        light-color-rgb-picker {
                                          display: block;
                                          width: 50%;
                                          padding 0px;
                                          margin: 0px;
                                        }
                                        light-color-rgb-picker .native-color-picker .container {
                                          display: none;
                                        }
                                      }
                                    .: |
                                      .type-custom-more-info-card {
                                        state-card-content { display: none;}
                                        background: transparent !important;
                                      }
                                      ha-card {
                                        background: transparent !important;
                                        box-shadow: none !important;
                                      }
                    tap_action:
                      action: toggle
                  domain: light
                  area: bedroom_2
              exclude:
                - options: {}
                  entity_id: light.room_02
                - options: {}
                  entity_id: light.bedroom
                - options: {}
                  entity_id: light.2nd_floor
