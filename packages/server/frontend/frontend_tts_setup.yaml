# Helpers
input_text:
  tts_message:
    name: "TTS Message"
    max: 255
    initial: ""

input_select:
  tts_model:
    icon: mdi:robot-happy
    name: "TTS Model"
    options:
      - Alexa
      - Nabu

input_boolean:
  alexa_whispermode:
    name: "Alexa Whisper Mode"

