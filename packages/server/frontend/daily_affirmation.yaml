automation:
  - alias: "Update Daily Affirmation"
    trigger:
      - platform: time
        at: "00:01:00"
      - platform: homeassistant
        event: start
    action:
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.daily_affirmation