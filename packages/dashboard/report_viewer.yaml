# | START: report_viewer.yaml
# |  PATH: /config/packages/dashboard/report_viewer.yaml


#  ╔═════════════════════════════════════════════════════════════════════════╗
#  ║     REPORT VIEWER CARD - DATA LAYER                                     ║
#  ╚═════════════════════════════════════════════════════════════════════════╝

#  Sensors and helpers for the report-viewer-card custom component.
#  Provides:
#    - Index sensor: scans /config/docs/reports/ for categories and files
#    - Content sensors: preloads the latest markdown report per category
#    - Recorder exclusions: keeps large text attributes out of the database
#
#  Reports are generated by analysis prompts and stored as dated markdown
#  files in /config/docs/reports/<category>/. The index sensor discovers
#  categories dynamically; adding a new report type just means creating
#  a folder and generating a report.
#
#  CARD CONFIG REFERENCE:
#    type: custom:report-viewer-card
#    index_sensor: sensor.report_index
#    content_sensors:
#      config-intel: sensor.report_content_config_intel
#      meta-insights: sensor.report_content_meta_insights
#      failure-mode: sensor.report_content_failure_mode
#      shared-ui-audit: sensor.report_content_shared_ui_audit
#      components-review: sensor.report_content_components_review
#      project-audit: sensor.report_content_project_audit




# ╭────────────────────╮
# │   INDEX SENSOR
# ╰────────────────────╯

#  Scans /config/docs/reports/ and returns the folder structure as a JSON
#  attribute. The card reads state_attr('sensor.report_index', 'index')
#  to get the full category-to-files mapping. Categories with no .md files
#  are excluded (e.g. components-review which contains only JSON).
#
#  Refreshes hourly. State value is a timestamp (content is in attributes).

command_line:

  - sensor:
      name: report_index
      unique_id: report_viewer_index
      command: >-
        python3 -c "import json,os,shutil;
        b='/config/docs/reports';w='/config/www/reports';
        os.makedirs(w,exist_ok=True);
        idx={};
        [idx.update({c:sorted([f for f in os.listdir(os.path.join(b,c)) if f.endswith('.md')],reverse=True)}) for c in sorted(os.listdir(b)) if os.path.isdir(os.path.join(b,c)) and any(f.endswith('.md') for f in os.listdir(os.path.join(b,c)))];
        [shutil.copytree(os.path.join(b,c),os.path.join(w,c),dirs_exist_ok=True) for c in idx];
        print(json.dumps({'index':idx}))"
      value_template: "{{ now().isoformat() }}"
      json_attributes:
        - index
      scan_interval: 3600




# ╭────────────────────╮
# │   CONTENT SENSORS
# ╰────────────────────╯

#  One sensor per report category. Each reads the most recent .md file
#  and stores the full content as a sensor attribute. This gives the card
#  instant tab switching with zero loading delay.
#
#  Attributes:
#    - content: full markdown text of the latest report
#    - filename: basename of the file (e.g. "2026-02-10-16-05-config-intel.md")
#
#  State is a timestamp (markdown content far exceeds the 255-char state limit).
#  Refreshes hourly to pick up newly generated reports.


  # ── CONFIG INTEL ──────────────────────────────────────────────────────────
  #  Configuration intelligence reports. Table-dominant, severity columns,
  #  14 sections. Typically 30-40KB.

  - sensor:
      name: report_content_config_intel
      unique_id: report_viewer_content_config_intel
      command: >-
        python3 -c "import json,os,glob;
        files=sorted(glob.glob('/config/docs/reports/config-intel/*.md'),reverse=True);
        c=open(files[0]).read() if files else '';
        print(json.dumps({'content':c,'filename':os.path.basename(files[0]) if files else ''}))"
      value_template: "{{ now().isoformat() }}"
      json_attributes:
        - content
        - filename
      scan_interval: 3600


  # ── META INSIGHTS ─────────────────────────────────────────────────────────
  #  Unused capability analysis. Prose-dominant with structured insight blocks.
  #  Typically 15-20KB.

  - sensor:
      name: report_content_meta_insights
      unique_id: report_viewer_content_meta_insights
      command: >-
        python3 -c "import json,os,glob;
        files=sorted(glob.glob('/config/docs/reports/meta-insights/*.md'),reverse=True);
        c=open(files[0]).read() if files else '';
        print(json.dumps({'content':c,'filename':os.path.basename(files[0]) if files else ''}))"
      value_template: "{{ now().isoformat() }}"
      json_attributes:
        - content
        - filename
      scan_interval: 3600


  # ── FAILURE MODE ──────────────────────────────────────────────────────────
  #  Failure mode analysis. Mixed tables and prose with cascade tree diagrams.
  #  Typically 15-20KB.

  - sensor:
      name: report_content_failure_mode
      unique_id: report_viewer_content_failure_mode
      command: >-
        python3 -c "import json,os,glob;
        files=sorted(glob.glob('/config/docs/reports/failure-mode/*.md'),reverse=True);
        c=open(files[0]).read() if files else '';
        print(json.dumps({'content':c,'filename':os.path.basename(files[0]) if files else ''}))"
      value_template: "{{ now().isoformat() }}"
      json_attributes:
        - content
        - filename
      scan_interval: 3600


  # ── SHARED UI AUDIT ───────────────────────────────────────────────────────
  #  UI system audit reports. Table-dominant with conformance findings.
  #  Typically 20-30KB.

  - sensor:
      name: report_content_shared_ui_audit
      unique_id: report_viewer_content_shared_ui_audit
      command: >-
        python3 -c "import json,os,glob;
        files=sorted(glob.glob('/config/docs/reports/shared-ui-audit/*.md'),reverse=True);
        c=open(files[0]).read() if files else '';
        print(json.dumps({'content':c,'filename':os.path.basename(files[0]) if files else ''}))"
      value_template: "{{ now().isoformat() }}"
      json_attributes:
        - content
        - filename
      scan_interval: 3600


  # ── COMPONENTS REVIEW ─────────────────────────────────────────────────────
  #  Component review data. Currently JSON-only (no .md files).
  #  Sensor exists for forward-compatibility; returns empty until
  #  markdown reports are generated for this category.

  - sensor:
      name: report_content_components_review
      unique_id: report_viewer_content_components_review
      command: >-
        python3 -c "import json,os,glob;
        files=sorted(glob.glob('/config/docs/reports/components-review/*.md'),reverse=True);
        c=open(files[0]).read() if files else '';
        print(json.dumps({'content':c,'filename':os.path.basename(files[0]) if files else ''}))"
      value_template: "{{ now().isoformat() }}"
      json_attributes:
        - content
        - filename
      scan_interval: 3600


  # ── PROJECT AUDIT ─────────────────────────────────────────────────────────
  #  Project-level audit reports. Category exists but no reports generated yet.
  #  Sensor exists for forward-compatibility; returns empty until reports
  #  are generated.

  - sensor:
      name: report_content_project_audit
      unique_id: report_viewer_content_project_audit
      command: >-
        python3 -c "import json,os,glob;
        files=sorted(glob.glob('/config/docs/reports/project-audit/*.md'),reverse=True);
        c=open(files[0]).read() if files else '';
        print(json.dumps({'content':c,'filename':os.path.basename(files[0]) if files else ''}))"
      value_template: "{{ now().isoformat() }}"
      json_attributes:
        - content
        - filename
      scan_interval: 3600




# ╭────────────────────╮
# │   RECORDER EXCLUSION
# ╰────────────────────╯

#  Report sensors store 10-40KB of markdown text in attributes.
#  Exclude them from the recorder to avoid database bloat.
#  The glob matches all seven sensors (index + six content).

recorder:
  exclude:
    entity_globs:
      - sensor.report_*


# | END: report_viewer.yaml
