# | START: claude_bridge.yaml
# |  PATH: /config/packages/ai/claude_bridge.yaml


#  ╔═════════════════════════════════════════════════════════════════════════╗
#  ║     CLAUDE BRIDGE                                                       ║
#  ╚═════════════════════════════════════════════════════════════════════════╝

#  Bidirectional text channel between Claude (via MCP conversation intents)
#  and Home Assistant automations/scripts.
#
#  Write path (Claude → HA):
#    Claude adds items to todo.claude_bridge via HassListAddItem intent.
#    Relay automation picks up new items, timestamps them, and copies to
#    input_text.claude_bridge_payload for downstream automations/scripts.
#    Todo item is cleared after relay. ~6K per item via intent layer.
#    Usable payload in input_text: ~244 chars (255 minus timestamp prefix).
#
#  Read path (HA → Claude):
#    Scripts/automations write to todo.claude_bridge_response using
#    todo.add_item with summary (label) and description (full payload).
#    Claude reads via todo_get_items. No practical size limit on description.
#    See also: transcript_pipeline.yaml which auto-writes Plaud transcripts
#    to this response channel.
#
#  Todo lists (created via UI, not defined here):
#    todo.claude_bridge           — write channel, Claude → HA
#    todo.claude_bridge_response  — read channel, HA → Claude
#
#  Payloads in input_text are prefixed with a unix timestamp to guarantee
#  state change even when the same command is sent consecutively.


#  ╔═════════════════════════════════════════════════════════════════════════╗
#  ║     CLAUDE CODE DISPATCH                                                ║
#  ╚═════════════════════════════════════════════════════════════════════════╝

#  Automated bridge allowing Claude.ai to dispatch tasks to the addon's
#  claude -p, with full config access, MCP tools, and documentation.
#
#  Flow:
#    Claude.ai writes task → todo.claude_code_tasks (via MCP)
#    Automation detects new item → touches signal file in /config/tmp/
#    Addon watcher detects signal → fetches task via REST API
#    Watcher runs: CLAUDECODE= claude -p "task" (from /config/)
#    Response written → todo.claude_bridge_response (shared read channel)
#    Task removed from queue
#
#  Todo list (created via UI, not defined here):
#    todo.claude_code_tasks  — dispatch request queue
#
#  Watcher script: /config/scripts/claude_dispatch.sh (runs in addon)
#  Protocol reference: /config/docs/projects/claude/bridge/claude-dispatch-protocol.md


# ── HELPERS (Bridge) ───────────────────────────────────────────────────────

input_text:
  claude_bridge_payload:
    name: Claude Bridge Payload
    max: 255
  claude_dispatch_status:
    name: Claude Dispatch Status
    max: 255

input_datetime:
  claude_bridge_last_received:
    name: Claude Bridge Last Received
    has_date: true
    has_time: true


# ── HELPERS (Dispatch) ────────────────────────────────────────────────────

  claude_dispatch_last_run:
    name: Claude Dispatch Last Run
    has_date: true
    has_time: true

  claude_dispatch_heartbeat:
    name: Claude Dispatch Heartbeat
    has_date: true
    has_time: true

input_boolean:
  claude_dispatch_running:
    name: Claude Dispatch Running
    icon: mdi:robot

input_select:
  claude_dispatch_model:
    name: Claude Dispatch Model
    options:
      - sonnet
      - opus
      - haiku
    initial: sonnet
    icon: mdi:brain


# ── SHELL COMMANDS ────────────────────────────────────────────────────────

shell_command:
  claude_dispatch_signal: "touch /config/tmp/dispatch_signal"


# ── AUTOMATION ──────────────────────────────────────────────────────────────

automation:
  - id: claude_bridge_relay
    alias: "Claude Bridge - Relay Payload"
    trigger:
      - platform: state
        entity_id: todo.claude_bridge
    condition:
      - condition: template
        value_template: "{{ states('todo.claude_bridge') | int(0) > 0 }}"
    action:
      # Fetch the most recent item from the bridge list
      - service: todo.get_items
        target:
          entity_id: todo.claude_bridge
        data:
          status: needs_action
        response_variable: items
      - variables:
          raw: "{{ items['todo.claude_bridge']['items'][-1]['summary'] | trim }}"

      # Prefix with unix timestamp to guarantee state change on repeat payloads
      # Truncate to 255 to prevent overflow from long payloads
      - service: input_text.set_value
        target:
          entity_id: input_text.claude_bridge_payload
        data:
          value: >-
            {{ (now().timestamp() | int | string ~ '|' ~ raw)[:255] }}

      # Record when the payload arrived
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.claude_bridge_last_received
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # Clear the todo item to prevent buildup
      - service: todo.remove_item
        target:
          entity_id: todo.claude_bridge
        data:
          item: "{{ raw }}"
        continue_on_error: true



  - id: claude_bridge_chat_bridge_test
    alias: "Claude Bridge - Chat Bridge Test"
    trigger:
      - trigger: webhook
        webhook_id: claude-chat-bridge-test
        allowed_methods:
          - POST
        local_only: false
    action:
      - action: input_text.set_value
        target:
          entity_id: input_text.claude_bridge_payload
        data:
          value: "{{ trigger.json.message }}"


      - action: todo.add_item
        target:
          entity_id: todo.c
        data:
          item: "{{ trigger.json.message }}"


  # ── Dispatch Signal ───────────────────────────────────────────────────
  # Detects new items in the dispatch queue and touches a signal file
  # on the shared filesystem. The addon watcher picks up the signal.

  - id: claude_dispatch_signal
    alias: "Claude Bridge - Dispatch Signal"
    trigger:
      - platform: state
        entity_id: todo.claude_code_tasks
    condition:
      - condition: template
        value_template: >-
          {{ state_attr('todo.claude_code_tasks', 'todo_items_count')
             | default(states('todo.claude_code_tasks'), true)
             | int(0) > 0 }}
      - condition: state
        entity_id: input_boolean.claude_dispatch_running
        state: "off"
    action:
      - service: shell_command.claude_dispatch_signal


# | END: claude_bridge.yaml