
# | START: alarm_time.yaml
# |  PATH: /config/packages/time/alarm_time.yaml



#  ╔═════════════════════════════════════════════════════════════════════════╗
#  ║     ALARMS (TIME-RELATED, NOT SECURITY)                                 ║
#  ╚═════════════════════════════════════════════════════════════════════════╝

#  • Time-based alarm related code, for things like morning alarm clocks. 


#──────────────────────────────╮
input_datetime:
#──────────────────────────────╯

  # ── ECHO ALARM TIME  ──────────────────────────────────────────────────────
  #  • Displays the time of the next Echo Show alarm

  echo_alarm_time:
    name: Echo Alarm Time
    has_date: false
    has_time: true
    initial: "09:00:00"




#──────────────────────────────╮
input_number:
#──────────────────────────────╯

  # ── ECHO TIMER MINUTES  ───────────────────────────────────────────────────
  #  • Enter how long a timer to set via an Echo Show

  echo_timer_minutes:
    name: "Echo Timer Minutes"
    min: 1
    max: 480
    step: 1
    initial: 15
    unit_of_measurement: "minutes"
    mode: box




template:

    #──────────────────────────╮
  - binary_sensor:
    #──────────────────────────╯


        # ── ECHO SHOW 5 ALARM EXISTS ────────────────────────────────────────
        #  • Checks if there is an Echo Show 5 alarm

      - name: "Next Echo Show 5 Alarm"
        unique_id: echo_show_5_alarm_exists
        state: >-
          {{ (state_attr('sensor.cam_s_echo_show_8_next_alarm','Status') == 'ON') }}




        # ── ALEXA ALARM OR TIMER ACTIVE ─────────────────────────────────────
        #  • Checks if any Alexa/Echo device has atimer or alarm set. 

      - name: "alarm_or_timer_active"
        unique_id: "alarm_or_timer_active"
        state: >
          {% set ns = namespace(active=false) %}
          {% set sensors = [
            'sensor.cam_s_3g_white_dot_next_alarm',
            'sensor.cam_s_echo_show_5_next_alarm',
            'sensor.echo_show_15_next_alarm',
            'sensor.cam_s_echo_show_8_next_alarm',
            'sensor.echo_flex_01_next_alarm',
            'sensor.echo_4g_matter_hub_next_alarm',
            'sensor.this_device_next_alarm',
            'sensor.cam_s_4g_white_dot_next_alarm',
            'sensor.cam_s_alexa_app_for_pc_next_alarm',
            'sensor.echo_flex_02_next_alarm',
            'sensor.cam_s_3g_white_dot_next_timer',
            'sensor.cam_s_echo_show_5_next_timer',
            'sensor.echo_show_15_next_timer',
            'sensor.cam_s_echo_show_8_next_timer',
            'sensor.echo_flex_01_next_timer',
            'sensor.echo_4g_matter_hub_next_timer',
            'sensor.this_device_next_timer',
            'sensor.cam_s_4g_white_dot_next_timer',
            'sensor.cam_s_alexa_app_for_pc_next_timer',
            'sensor.echo_flex_02_next_timer'
          ] %}
          {% for sensor in sensors %}
            {% set sensor_state = states(sensor)|lower %}
            {% if sensor_state not in ['unavailable', 'unknown', 'none', ''] %}
              {% set ns.active = true %}
            {% endif %}
            {% set attr = state_attr(sensor, 'sorted_active') %}
            {% if attr %}
              {% if attr is string %}
                {% set alerts = attr | from_json %}
              {% else %}
                {% set alerts = attr %}
              {% endif %}
              {% for alert in alerts %}
                {% if 'date_time' in alert[1] or 'triggerTime' in alert[1] %}
                  {% set ns.active = true %}
                {% endif %}
              {% endfor %}
            {% endif %}
          {% endfor %}
          {{ ns.active }}




#──────────────────────────────╮
automation:
#──────────────────────────────╯


    # ── BED SHAKER:  OFF BUTTON  ────────────────────────────────────────────
    #  • Button to turn off the vibrating bed shaker. 




  - id: bed_shaker_off_button
    alias: Bed Shaker Off Button (Hue Button B02)
    mode: single
    triggers:
      - device_id: 69bfedb425cc004c936547a02829bef8
        domain: zha
        type: remote_button_short_press
        subtype: turn_on
        trigger: device
    action:
      - service: switch.turn_off
        target:
          entity_id:
            - switch.sonoff_usb_plug
            - switch.mpm_09
  - id: one_shot_wake_alarm_2026_04_09
    alias: "One-shot wake alarm 2026-04-09"
    description: "Emergency wake - fires industrial vibrator if not in office by 07:30"
    mode: single
    triggers:
      - trigger: time
        at: "07:30:00"
    conditions:
      - condition: state
        entity_id: binary_sensor.presence_office
        state: "off"
    actions:
      - action: switch.turn_on
        target:
          entity_id: switch.mpm_09
      - action: automation.turn_off
        target:
          entity_id: automation.one_shot_wake_alarm_2026_04_09


# |   END: alarm_time.yaml
