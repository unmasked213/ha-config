
# | START: weather_info_card.yaml
# | PATH: /config/templates/custom_button_card_templates/olympus_cards/weather_info_card/weather_info_card.yaml



# ➔ Weather Information Card
#   Comprehensive weather display with dynamic weather icons, temperature colors, and precipitation
#   forecasting. Features intelligent icon selection including moon phases, sunrise/sunset transitions,
#   and weather state mapping. Core functionality:
#
#     • Dynamic weather icons with sun transition detection and moon phase display
#     • Color-coded temperature with animated digit display
#     • Precipitation forecast with timing and snow/rain differentiation
#     • Tap navigation to weather dashboard, hold for popup forecast
#     • Performance-optimized with caching and error handling


# | EXAMPLE USAGE

# ➔ REQUIRED:
# type: custom:button-card
# template: weather_info_card

# ➔ OPTIONAL:
# variables:
#   weather_entity: weather.pirateweather
#   sun_entity: sun.sun
#   moon_phase_entity: sensor.moon_phase
#   precip_intensity_entity: sensor.pirateweather_precip_intensity
#   precip_forecast_entity: sensor.pirateweather_today_precipitation_accumulation
#   fallback_weather_entity: weather.forecast_home
#   navigation_path: /dashboard-home/weather
#   popup_title: Weather Details



weather_info_card:

  variables:
    weather_entity: weather.pirateweather                                          # Primary weather entity for temperature and conditions
    sun_entity: sun.sun                                                            # Required for sunrise/sunset transition detection
    moon_phase_entity: sensor.moon_phase                                           # Used for nighttime moon phase icons
    precip_intensity_entity: sensor.pirateweather_precip_intensity                 # Validates actual vs forecasted precipitation
    precip_forecast_entity: sensor.pirateweather_today_precipitation_accumulation  # Hourly precipitation forecast with 'values' attribute
    fallback_weather_entity: weather.forecast_home                                 # Backup when primary shows false rain conditions
    navigation_path: /dashboard-home/weather
    popup_title: Weather Details

  show_icon: false
  show_name: false
  show_state: false

  tap_action:
    action: navigate
    navigation_path: '[[[ return variables.navigation_path; ]]]'
    haptic: success

  hold_action:
    action: fire-dom-event                                                         # Browser_mod popup for detailed forecast
    browser_mod:
      service: browser_mod.popup
      data:
        title: '[[[ return variables.popup_title; ]]]'
        content:
          type: weather-forecast
          entity: '[[[ return variables.weather_entity; ]]]'
          show_forecast: true

  styles:
    card:
      - height: 120px
      - width: 220px
      - position: relative
      - margin-top: 110px                                                          # Extra space for large weather icon overflow
      - display: flex
      - align-items: center
      - background: var(--ha-card-background)
      - backdrop-filter: blur(3px)
      - border-radius: var(--ha-card-border-radius, 12px)
      - animation: cardIn 0.8s cubic-bezier(0.23, 1, 0.32, 1) both

    custom_fields:
      weather_icon:
        - position: absolute
        - top: 50%
        - left: 5px
        - width: 115px                                                             # Large icon size for visual impact
        - transform: translateY(-50%)
        - animation: iconIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both 0.4s       # Bouncy entrance effect

      temp_field:
        - position: absolute
        - bottom: 52px
        - right: 20px
        - overflow: visible                                                        # Allow degree symbol positioning
        - font-size: 2em
        - font-weight: 400
        - animation: tempIn 0.7s ease-out both 0.8s

      rain_field:
        - position: absolute
        - bottom: 25px                                                             # Positioned below temperature
        - right: 26px
        - font-size: 0.83em
        - font-weight: 300
        - color: var(--primary-text-color)
        - white-space: nowrap
        - animation: tempIn 0.6s ease-out both 1s
        - overflow: visible

  custom_fields:
    weather_icon: |
      [[[ 
        // === Weather Icon — priority: transition > hazards > precip > moon@night > standard ===
        // CONFIG + ENTITIES
        const CONFIG = {
          CACHE_MS: 300000,                  // 5 min cache window
          MAX_CACHE_ENTRIES: 16,             // per-field LRU cap
          ICON_SIZE: 115,
          DAY_MS: 86400000,
          GLOW: 'drop-shadow(0 0 3px rgba(255,255,255,0.2))',
          TRANSITION_MIN_BY_MONTH: [10,10,15,15,20,20,20,20,15,15,10,10],
          CLOUD_HEAVY: 85,
          CLOUD_PARTLY: 60,
          LOG: false                          // flip true to debug
        };
        const ENT_DEFAULT = {
          weather: variables.weather_entity || 'weather.pirateweather',
          precip_intensity: variables.precip_intensity_entity || 'sensor.pirateweather_precip_intensity',
          precip_accum: variables.precip_forecast_entity || 'sensor.pirateweather_today_precipitation_accumulation',
          moon: variables.moon_phase_entity || 'sensor.moon_phase',
          cloud: 'sensor.pirateweather_cloud_cover',
          sun: variables.sun_entity || 'sun.sun',
          fallback: variables.fallback_weather_entity || 'weather.forecast_home'
        };

        // Robust namespace init (don’t assume sub-objects exist)
        const ns = (window.__haWxCard = window.__haWxCard || {});
        ns.v = ns.v || '2.3.1';
        ns.cache = ns.cache || {};
        ns.util = ns.util || {};
        ns.ENT = Object.assign({}, ENT_DEFAULT, ns.ENT || {});
        const ENT = ns.ENT;

        // Shared utils (define once)
        if (!ns.util.warnOnce) ns.util.warnOnce = (k,msg)=>{ ns.__warn = ns.__warn||{}; if(ns.__warn[k]) return; ns.__warn[k]=1; if (CONFIG.LOG) console.warn(msg); };
        if (!ns.util.lru) ns.util.lru = (bucketName, max)=>{
          const bucket = (ns.cache[bucketName] = ns.cache[bucketName] || { data:{}, order:[] });
          return {
            get:(key)=> bucket.data[key],
            set:(key,val)=>{ bucket.data[key]=val; const o=bucket.order; const i=o.indexOf(key); if(i!==-1)o.splice(i,1); o.push(key); while(o.length>max){ const ev=o.shift(); delete bucket.data[ev]; } },
            clear:()=>{ bucket.data={}; bucket.order=[]; }
          };
        };

        const cache = ns.util.lru('icon', CONFIG.MAX_CACHE_ENTRIES);

        // Known-good Meteocons ids
        const KNOWN = new Set([
          'clear-day','clear-night','partly-cloudy-day','partly-cloudy-night','cloudy','rain','snow','thunderstorms','fog','sunrise','sunset',
          'moon-new-fill','moon-waxing-crescent-fill','moon-first-quarter-fill','moon-waxing-gibbous-fill','moon-full-fill','moon-waning-gibbous-fill','moon-last-quarter-fill','moon-waning-crescent-fill'
        ]);

        const WEATHER_MAP = {
          clear: ['clear-day','clear-night'],
          sunny: ['clear-day','clear-night'],
          exceptional: ['clear-day','clear-night'],
          partlycloudy: ['partly-cloudy-day','partly-cloudy-night'],
          cloudy: ['cloudy','cloudy'],
          rain: ['rain','rain'],
          snow: ['snow','snow'],
          thunderstorms: ['thunderstorms','thunderstorms'],
          fog: ['fog','fog']
        };

        const MOON = {
          full_moon:       { icon: 'moon-full-fill',            color: 'hsl(40, 20%, 95%)', glow: true  },
          waxing_gibbous:  { icon: 'moon-waxing-gibbous-fill',  color: 'hsl(35, 15%, 90%)', glow: false },
          first_quarter:   { icon: 'moon-first-quarter-fill',   color: 'hsl(30, 10%, 88%)', glow: false },
          waxing_crescent: { icon: 'moon-waxing-crescent-fill', color: 'hsl(25,  5%, 85%)', glow: false },
          new_moon:        { icon: 'moon-new-fill',             color: 'hsl(220, 5%, 80%)', glow: false },
          waning_crescent: { icon: 'moon-waning-crescent-fill', color: 'hsl(225, 5%, 82%)', glow: false },
          last_quarter:    { icon: 'moon-last-quarter-fill',    color: 'hsl(230,10%, 85%)', glow: false },
          waning_gibbous:  { icon: 'moon-waning-gibbous-fill',  color: 'hsl(235,15%, 88%)', glow: false }
        };

        const warnOnce = ns.util.warnOnce;
        const exists = (id) => hass?.states?.[id] !== undefined;
        const createIcon = (name, opts={}) => {
          const { size=CONFIG.ICON_SIZE, color='', glow=false } = opts;
          const id = name.includes(':') ? name : `meteocons:${name}`;
          const key = id.split(':')[1];
          const safeId = KNOWN.has(key) ? id : 'meteocons:clear-day';
          const styles = [`width:${size}px`,`height:${size}px`,`--mdc-icon-size:${size}px`, color && `color:${color}`, glow && `filter:${CONFIG.GLOW}`].filter(Boolean).join(';');
          return `<ha-icon icon="${safeId}" style="${styles}"></ha-icon>`;
        };
        const safe = (id, attr=null, fb='') => { try { const e = hass?.states?.[id]; if (!e) { warnOnce(`miss:${id}`, `wx-card: missing entity ${id}`); return fb; } return attr ? (e.attributes?.[attr] ?? fb) : (e.state ?? fb); } catch { return fb; } };
        const parseDT = (s) => { const d = new Date(s); return isNaN(d) ? null : d; };

        const getTransitionIcon = () => {
          if (!exists(ENT.sun)) return { active:false, night:false };
          const night = (safe(ENT.sun) === 'below_horizon');
          const now = new Date();
          const win = (CONFIG.TRANSITION_MIN_BY_MONTH[now.getMonth()] || 15) * 60000;
          const rise = parseDT(safe(ENT.sun,'next_rising'));
          const set  = parseDT(safe(ENT.sun,'next_setting'));
          if (!rise || !set) return { active:false, night };
          const t = now.getTime();
          const last = night ? ((set.getTime() > t) ? set.getTime()-CONFIG.DAY_MS : set.getTime())
                             : ((rise.getTime()> t) ? rise.getTime()-CONFIG.DAY_MS : rise.getTime());
          const dt = t - last;
          if (dt>=0 && dt<=win) {
            const p = Math.min(dt/win,1);
            const hue = night?25:40, sat=85+p*10, light=60+p*5;
            return { active:true, night, color:`hsl(${hue}, ${sat}%, ${light}%)`, icon: night?'sunset':'sunrise' };
          }
          return { active:false, night };
        };

        const normalizeState = () => {
          let st = String(safe(ENT.weather, null, 'clear'));
          st = st.replace(/-(?:day|night)$/,'');
          if (/^(rainy|pouring|drizzle)$/.test(st)) st = 'rain';
          if (/^(sleet|freezing_rain|hail|mixed)$/.test(st)) st = 'snow';
          if (/^(lightning|thunderstorm|thunderstorms)$/.test(st)) st = 'thunderstorms';
          if (/^(mist|haze|smoke)$/.test(st)) st = 'fog';
          if (st === 'rain') {
            const i = parseFloat(safe(ENT.precip_intensity, null, '0'));
            if (!isFinite(i) || i === 0) {
              const fbRaw = String(safe(ENT.fallback, null, 'clear'));
              st = fbRaw ? fbRaw.replace(/-(?:day|night)$/,'') : 'clear';
            }
          }
          return st;
        };

        const cloudBucket = () => {
          let v = Number(safe(ENT.cloud, null, NaN));
          if (!Number.isFinite(v)) v = Number(safe(ENT.weather,'cloud_coverage', NaN));
          if (!Number.isFinite(v)) return null;
          v = Math.max(0, Math.min(100, v));
          return v >= CONFIG.CLOUD_HEAVY ? 'heavy' : v >= CONFIG.CLOUD_PARTLY ? 'partly' : 'light';
        };

        const getMoonIcon = () => { const phase = safe(ENT.moon); const cfg = MOON[phase]; return cfg ? createIcon(cfg.icon, { color: cfg.color, glow: cfg.glow }) : null; };
        const standardIcon = (st, night) => { const pair = WEATHER_MAP[st] || ['clear-day','clear-night']; return createIcon(night ? pair[1] : pair[0]); };

        const tr = getTransitionIcon();
        const st = normalizeState();
        const bucket = cloudBucket();
        const night = !!(tr?.night);
        const sig = JSON.stringify({ trA: tr?.active, trI: tr?.icon, trC: tr?.color, st, bucket, night });
        const key = variables.weather_entity || 'weather_card';
        const hit = cache.get(key);
        if (hit && hit.sig === sig && (Date.now() - hit.ts) < CONFIG.CACHE_MS) return hit.html;

        let out;
        try {
          if (tr?.active) {
            out = createIcon(tr.icon, { color: tr.color, glow: true });
          } else if (st === 'thunderstorms' || st === 'fog') {
            out = standardIcon(st, night);
          } else if (st === 'rain' || st === 'snow') {
            out = standardIcon(st, night);
          } else if (night) {
            if (bucket === 'heavy') out = createIcon('cloudy');
            else if (bucket === 'partly') out = createIcon('partly-cloudy-night');
            else out = getMoonIcon() || createIcon('clear-night');
          } else {
            out = standardIcon(st, false);
          }
        } catch (e) {
          ns.util.warnOnce('icon-error', `wx-card: icon error ${e}`);
          out = createIcon('clear-day');
        }

        const aria = night ? (tr?.active ? `Sun ${tr.icon}` : (st==='rain'||st==='snow'||st==='fog'||st==='thunderstorms'? st : (safe(ENT.moon) || 'clear night'))) : st || 'clear';
        const wrapped = `<span role="img" aria-label="Weather: ${aria}">${out}</span>`;
        cache.set(key, { sig, ts: Date.now(), html: wrapped });
        return wrapped;
      ]]]

    temp_field: |
      [[[ 
        // === Temperature — animated, memoized, a11y ===
        const CONFIG = { BASE:1.3, STEP:0.1, DEG:0.05, DUR:'0.4s', DEF_TEMP: 23, COLORS:{ VERY_COLD:'#52B8F9', COLD:'#72CAFF', HOT:'#FFD700', VERY_HOT:'#E56B42' }, MAX:16 };
        const ns = (window.__haWxCard = window.__haWxCard || {});
        ns.v = ns.v || '2.3.1';
        ns.cache = ns.cache || {};
        ns.util = ns.util || {};
        if (!ns.util.lru) ns.util.lru = (bucketName, max)=>{ const b=(ns.cache[bucketName]=ns.cache[bucketName]||{data:{},order:[]}); return { get:(k)=>b.data[k], set:(k,v)=>{ b.data[k]=v; const o=b.order; const i=o.indexOf(k); if(i!==-1)o.splice(i,1); o.push(k); while(o.length>max){ const ev=o.shift(); delete b.data[ev]; } } }; };
        if (!ns.util.warnOnce) ns.util.warnOnce = (k,msg)=>{ ns.__warn = ns.__warn||{}; if(ns.__warn[k]) return; ns.__warn[k]=1; console.warn(msg); };
        const cache = ns.util.lru('temp', CONFIG.MAX);

        const span = (c,d,extra='')=>`<span style="display:inline-block;will-change:transform;animation:digitIn ${CONFIG.DUR} ease-out both ${d}s${extra?';'+extra:''}">${c}</span>`;
        const tint = (t)=> t<=5?CONFIG.COLORS.VERY_COLD : t<=15?CONFIG.COLORS.COLD : t>=30?CONFIG.COLORS.VERY_HOT : t>=25?CONFIG.COLORS.HOT : '';

        try {
          const v = hass?.states?.[variables.weather_entity]?.attributes?.temperature;
          const n = Math.round(Number(v));
          const t = Number.isFinite(n) ? n : CONFIG.DEF_TEMP;
          const key = variables.weather_entity || 'weather_card';
          const sig = `t:${t}`;
          const hit = cache.get(key);
          if (hit && hit.sig === sig) return hit.html;

          const s = String(Math.abs(t));
          const color = tint(t);
          const style = color?`color:${color}`:'';
          const digits = [...s].map((d,i)=>span(d, CONFIG.BASE + i*CONFIG.STEP, style)).join('');
          const deg = span('°', CONFIG.BASE + s.length*CONFIG.STEP + CONFIG.DEG, `font-size:0.6em;vertical-align:super${style?';'+style:''}`);
          const sign = t<0 ? span('-', CONFIG.BASE - CONFIG.STEP, style) : '';
          const inner = sign + digits + deg;
          const wrapped = `<span role="img" aria-label="Temperature: ${t} degrees">${inner}</span>`;
          cache.set(key, { sig, html: wrapped });
          return wrapped;
        } catch (e) {
          ns.util.warnOnce('temp-fallback', 'wx-card: Using default temp (entity unavailable)');
          return span('--°', CONFIG.BASE, 'font-size:0.6em;vertical-align:super');
        }
      ]]]

    rain_field: |
      [[[ 
        // === Next precipitation — memoized, human-readable times, a11y ===
        const CFG = { TH:0.1, BASE:1.2, STEP:0.1, FREEZE:0, SIZE:24, VB:'0 0 24 24', MAX:16 };
        const ns = (window.__haWxCard = window.__haWxCard || {});
        ns.v = ns.v || '2.3.1';
        ns.cache = ns.cache || {};
        ns.util = ns.util || {};
        if (!ns.util.lru) ns.util.lru = (bucketName, max)=>{ const b=(ns.cache[bucketName]=ns.cache[bucketName]||{data:{},order:[]}); return { get:(k)=>b.data[k], set:(k,v)=>{ b.data[k]=v; const o=b.order; const i=o.indexOf(k); if(i!==-1)o.splice(i,1); o.push(k); while(o.length>max){ const ev=o.shift(); delete b.data[ev]; } } }; };
        const cache = ns.util.lru('rain', CFG.MAX);
        ns.ENT = Object.assign({}, ns.ENT || {}, { weather:variables.weather_entity || 'weather.pirateweather', precip_accum:variables.precip_forecast_entity || 'sensor.pirateweather_today_precipitation_accumulation' });
        const ENT = ns.ENT;

        const PATH='M12,3.77L11.25,4.61C11.25,4.61 9.97,6.06 8.68,7.94C7.39,9.82 6,12.07 6,14.23A6,6 0 0,0 12,20.23A6,6 0 0,0 18,14.23C18,12.07 16.61,9.82 15.32,7.94C14.03,6.06 12.75,4.61 12.75,4.61L12,3.77Z';
        const svg = (c)=>`<svg xmlns="http://www.w3.org/2000/svg" width="${CFG.SIZE}" height="${CFG.SIZE}" viewBox="${CFG.VB}" style="vertical-align:-6px;margin-right:-0.5px">${c}</svg>`;
        const span=(c,d,x='')=>`<span style="display:inline-block;will-change:transform;animation:digitIn 0.4s ease-out both ${d}s${x?';'+x:''}">${c}</span>`;
        const grad=(id,arr)=>`<defs><linearGradient id="${id}" x1="0%" y1="0%" x2="100%" y2="100%">${arr.map((c,i)=>`<stop offset="${i*100}%" stop-color="${c}"/>`).join('')}</linearGradient></defs>`;
        const drop=(id,cols)=> svg(grad(id,cols)+`<path fill="url(#${id})" class="rain-drop" d="${PATH}"/>`);
        const dry = ()=> svg(`<path fill="var(--contrast8,#888)" d="${PATH}"/><line x1="4" y1="20" x2="20" y2="4" stroke="var(--contrast8,#888)" stroke-width="2"/>`);

        const fmtAbs12 = (idx)=>{ const h=idx%24; const h12=(h%12)||12; const suf=h>=12?'pm':'am'; return `${h12}${suf}`; };
        const fmtRel = (idx)=> idx===0 ? 'now' : `in ${idx}h`;

        try {
          const key = variables.weather_entity || 'weather_card';
          const t = Number(hass?.states?.[ENT.weather]?.attributes?.temperature ?? 23);
          const vals = hass?.states?.[ENT.precip_accum]?.attributes?.values;
          const arr = Array.isArray(vals) ? vals.map(Number).filter(v=>Number.isFinite(v) && v>=0) : [];
          const idx = arr.findIndex(v => v >= CFG.TH);
          const sig = `t:${t}|len:${arr.length}|first:${idx}`;
          const hit = cache.get(key);
          if (hit && hit.sig === sig) return hit.html;

          const base = CFG.BASE;
          if (t <= CFG.FREEZE) {
            const icon = span(drop(`${key.replace(/[^A-Za-z0-9_]/g,'_')}_snow`, ['#86c3db','#5eafcf']), base);
            const wrapped = `<span role="img" aria-label="Snow likely">${icon}</span>`;
            cache.set(key,{sig,html:wrapped});
            return wrapped;
          }
          if (!arr.length || idx === -1) {
            const icon = span(dry(), base);
            const wrapped = `<span role="img" aria-label="No rain expected">${icon}</span>`;
            cache.set(key,{sig,html:wrapped});
            return wrapped;
          }

          const icon = span(drop(`${key.replace(/[^A-Za-z0-9_]/g,'_')}_rain`, ['#64b5f6','#1976d2']), base);
          const absolute = arr.length >= 24; // hourly-of-day bins
          const labelStr = absolute ? fmtAbs12(idx) : fmtRel(idx);
          const label = [...labelStr].map((ch,i)=> span(ch, base + (i+1)*CFG.STEP)).join('');
          const wrapped = `<span role="img" aria-label="Rain ${absolute?'at':'in'} ${labelStr}">${icon}${label}</span>`;
          cache.set(key,{sig,html:wrapped});
          return wrapped;
        } catch (e) {
          return span(svg(`<path fill="var(--error-color,#ff5252)" d="${PATH}"/>`), CFG.BASE);
        }
      ]]]
    tilt: |
      [[[ 
        // === VanillaTilt (guarded & idempotent) ===
        setTimeout(() => {
          try {
            const el = this.shadowRoot?.getElementById('card');
            if (!el || typeof VanillaTilt !== 'function') return;
            if (el.dataset.tiltInit === '1') return; // already initialized
            VanillaTilt.init(el, { max:15, scale:1.06, glare:true, 'max-glare':0.35, perspective:1000, speed:1000, gyroscope:true, gyroscopeMinAngleX:-45, gyroscopeMaxAngleX:45, gyroscopeMinAngleY:-45, gyroscopeMaxAngleY:45 });
            el.style.transition = 'all 0.8s cubic-bezier(0.03, 0.98, 0.52, 0.99)';
            el.style.willChange = 'transform';
            el.dataset.tiltInit = '1';
          } catch (e) { const ns=(window.__haWxCard=window.__haWxCard||{}); if (ns.LOG) console.warn('wx-card: tilt init error', e); }
        }, 100);
      ]]]

  extra_styles: >
    @keyframes cardIn { 0% { transform: scale(0.96); opacity: 0; backdrop-filter:
    blur(4px); } 100% { transform: scale(1); opacity: 1; backdrop-filter: blur(0);
    } }

    @keyframes iconIn { 0% { opacity: 0; transform: translateY(-50%) scale(0.7)
    rotate(-5deg); filter: contrast(0.5); } 70% { opacity: 1; transform:
    translateY(-50%) scale(1.02); filter: contrast(1.1); } 100% { transform:
    translateY(-50%) scale(1); filter: contrast(1); } }

    @keyframes tempIn { 0% { opacity: 0; transform: translateY(10px); } 100% {
    opacity: 1; transform: translateY(0); } }

    @keyframes digitIn { from { opacity: 0; transform: scaleY(0.5)
    translateY(20px); } to { opacity: 1; transform: scaleY(1) translateY(0); } }

    .rain-drop { animation: rainDrop 3s ease-in-out infinite; transform-origin:
    center; }

    @keyframes rainDrop { 0%,100% { transform: translateY(0); } 50% { transform:
    translateY(1px); } }

    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation:
    none !important; transform: none !important; opacity: 1 !important; filter:
    none !important; } }



# | END: weather_info_card.yaml
