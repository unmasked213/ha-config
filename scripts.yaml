    text_color: '{{ text_color | default(''var(--primary-text-color)'') }}'
    border_color: '{{ border_color | default(''rgba(255, 46, 146, 1)'') }}'
    border_width: '{{ border_width | default(''3px'') }}'
    border_radius: '{{ border_radius | default(''16px'') }}'
    padding: '{{ padding | default(''14px 14px 14px 14px'') }}'
    font_size: '{{ font_size | default(''1em'') }}'
    font_weight: '{{ font_weight | default(''400'') }}'
    letter_spacing: '{{ letter_spacing | default(''0.5px'') }}'
    word_spacing: '{{ word_spacing | default(''1.5px'') }}'
    position_bottom: '{{ position_bottom | default(''100px'') }}'
    position_right: '{{ position_right | default(''18px'') }}'
    toast_gap: '{{ toast_gap | default(''16px'') }}'
    max_toasts: '{{ max_toasts | default(10) }}'
    max_width: '{{ max_width | default(''33vw'') }}'
    box_shadow: '{{ box_shadow | default(''none'') }}'
    user_id: '{{ user_id | default(''person.apple'') }}'
    icon: '{{ icon | default('''') }}'
    icon_color: '{{ icon_color | default(text_color) }}'
    icon_background: '{{ icon_background | default(border_color) }}'
    icon_size: '{{ icon_size | default(''38px'') }}'
    screen_border_enabled: '{{ screen_border_enabled | default(true) }}'
    screen_border_duration: '{{ screen_border_duration | default(duration) }}'
    screen_border_color: '{{ screen_border_color | default(border_color) }}'
    screen_border_stroke: '{{ screen_border_stroke | default(14) }}'
