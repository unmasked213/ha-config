        - start; paused = true; } };\n      el.onmouseleave = () => { if (paused)
        { start = Date.now(); paused = false; schedule(); } };\n      return schedule;\n
        \   }\n\n    function getSidebarWidth() {\n      const ha = $(\"home-assistant\");\n
        \     const main = ha?.shadowRoot && $(\"home-assistant-main\", ha.shadowRoot);\n
