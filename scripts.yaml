        \     wrap.style.cssText = `position:absolute;left:-${protrusion}px;top:-${protrusion}px;width:${c.iconSize};height:${c.iconSize};background:${c.iconBg};border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0
        2px 8px rgba(0,0,0,0.25)`;\n      const icon = document.createElement(\"ha-icon\");\n
        \     icon.setAttribute(\"icon\", c.icon);\n      icon.style.cssText = `color:${c.iconColor};--mdc-icon-size:${size
