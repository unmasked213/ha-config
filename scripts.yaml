    service: notify.a
    data:
      title: Hello world
      message: The sun is {% if is_state('sun.sun', 'above_horizon') %}up{% else %}down{%
        endif %} right now.
      data:
        image: https://ichef.bbci.co.uk/news/976/cpsprodpb/4694/production/_130386081_whatsubject.jpg.webp
    enabled: true
  - if:
