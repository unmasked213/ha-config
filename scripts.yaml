            - type: light
              entity: light.sb_table_light_c_side
              no_card: true
              double_tap_action:
                action: none
              hold_action:
                action: more-info
              name: ⠀
            - type: light
              entity: light.sb_light_strip_bed
              icon: mdi:bed-double
              no_card: true
              double_tap_action:
                action: none
              hold_action:
                action: more-info
              name: ⠀
          - type: horizontal-stack
            cards:
            - type: light
              entity: light.sb_light_strip_door
              icon: mdi:door
              no_card: true
              double_tap_action:
                action: none
              hold_action:
                action: more-info
              name: ⠀
            - type: light
              entity: light.sb_light_strip_pc
              icon: mdi:desktop-tower-monitor
              no_card: true
              double_tap_action:
                action: none
              hold_action:
                action: more-info
              name: ⠀
          - type: custom:mini-graph-card
            card_mod:
              style: ".graph .graph__container .graph__container__svg svg g mask .line
                {\n  animation-duration: 5s !important;\n  animation-delay: 0s !important;\n
                \ animation-timing-function: linear !important;\n}    \nha-card {\n
                \ background-color: transparent !important;\n}\nha-card .graph {\n
                \ background: transparent !important;\n}\n"
            animate: true
            hours_to_show: 0.5
            points_per_hour: 24
            detail: 3
            color_thresholds:
            - value: 20
              color: var(--yellow)
            - value: 1
              color: var(--blue-tint)
            line_color: '#fffec1'
            name: Room illuminance (1hr)
            tap_action:
              action: none
            show:
              icon: false
              name: false
              state: true
              legend: false
              fill: fade
              labels: hover
              graph: line
            entities:
            - entity: sensor.fp2_floor_2_light_sensor_light_level
