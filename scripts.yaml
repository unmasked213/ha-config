        }},\n    fontSize: {{ font_size | tojson }},\n    fontWeight: {{ font_weight
        | tojson }},\n    letterSpace: {{ letter_spacing | tojson }},\n    wordSpace:
        {{ word_spacing | tojson }},\n    posBottom: {{ position_bottom | tojson }},\n
        \   posRight: {{ position_right | tojson }},\n    gap: {{ toast_gap | tojson
        }},\n    maxToasts: Number({{ max_toasts }}),\n    maxWidth: {{ max_width
        | tojson }},\n    boxShadow: {{ box_shadow | tojson }},\n    icon: {{ icon
        | tojson }},\n    iconColor: {{ icon_color | tojson }},\n    iconBg: {{ icon_background
        | tojson }},\n    iconSize: {{ icon_size | tojson }},\n    screenBorder: {\n
        \     enabled: Boolean({{ screen_border_enabled | default(true) | tojson }}),\n
        \     ms: Number({{ screen_border_duration | default(6000) }}),\n      color:
        {{ screen_border_color | tojson }},\n      stroke: Number({{ screen_border_stroke
        | default(14) }}),\n      cornerRadius: Number({{ screen_border_corner_radius
        | default(48) }}),\n      inset: Number({{ screen_border_inset | default(16)
