        zone: zone.home
        alias: If C is home (Purley)
      - condition: state
        entity_id: sensor.a_sessionstate
        state: Unlocked
        for:
          hours: 0
          minutes: 0
          seconds: 1
        alias: If PC is unlocked
    then:
