update_prompt_description:
  alias: Update Prompt Description
  description: Create a short explanation of what a given prompt does (1–2 simple
    sentences), and optionally a title.
  mode: single
  fields:
    content:
      name: Prompt Content
      description: The prompt text to generate a description for
      required: true
      selector:
        text:
    include_title:
      name: Include Title
      description: Whether to also generate a title for the prompt
      required: false
      default: false
      selector:
        boolean:
  sequence:
  - action: ai_task.generate_data
    response_variable: ai_result
    data:
      task_name: update_prompt_description
      instructions: 'Write ONE sentence (max 20 words) explaining what this prompt
        does. Use plain language (coworker tone), describing the concrete outcome
        and when you’d use it.

        BANNED WORDS (description only): solution, execution, deliverable, leverage,
        optimize, streamline, facilitate, synthesize, traceable, stakeholder, actionable,
        high-stakes, trade-offs, workflow, framework

        Same idea, different tone: - NO: "Merges opposing proposals into execution-ready
        solutions" - YES: "When two people disagree, finds a plan that works for both"

        - NO: "Generates structured meeting deliverables with action items" - YES:
        "Writes up meeting notes so everyone knows what to do next"

        - NO: "Optimizes code performance through refactoring" - YES: "Makes slow
        code run faster"

        Be specific but human. What does it actually do?

        {% if include_title %} Also create a title (2–4 words) that is a plain role/label,
        not marketing.

        Title rules: - Title Case. - Noun phrase that combines: [main object] + [job/action].
        - Prefer “-er” roles (Writer, Checker, Summarizer, Planner) or compact noun
        pairs. - Must include at least one specific domain noun from the prompt (e.g.,
        “Meeting”, “Code”, “Debate”, “Home Assistant”). - Avoid vague words: Helper,
        Tool, Manager, Generator, Assistant, System, Prompt. - No punctuation, no
        quotes.

        Title examples: - "Meeting Notes Writer" - "Code Review Checker" - "Debate
        Plan Finder" - "Slow Code Speedup" {% endif %}

        Prompt: {{ content }}'
      structure:
        description:
          description: A short summary of what the prompt does
          selector:
            text:
        title:
          description: A short title for the prompt (2-4 words)
          selector:
            text:
  - stop: Returning description
    response_variable: ai_result
generate_variable_descriptions:
  alias: Generate Variable Descriptions
  description: Generate helpful descriptions for template variables in a prompt based
    on context.
  mode: single
  fields:
    content:
      name: Prompt Content
      description: The full prompt text containing the variables
      required: true
      selector:
        text:
          multiline: true
    variables:
      name: Variables
      description: List of variable names that need descriptions
      required: true
      selector:
        text: {}
  sequence:
  - action: ai_task.generate_data
    response_variable: ai_result
    data:
      task_name: generate_variable_descriptions
      instructions: 'You are analyzing a prompt template to generate helpful descriptions
        for its variables.

        For each variable listed, write a SHORT description (5-10 words) explaining
        what value the user should provide. Be specific to how the variable is used
        in this prompt.

        Guidelines: - Be concrete: "The programming language to use" not "The input
        value" - Match the context: if the prompt is about code review, describe variables
        in that context - Keep it brief: users will see this as placeholder text -
        Use sentence fragments: "Company name to analyze" not "This is the company
        name to analyze"

        Return ONLY a JSON object mapping each variable name to its description. Example:
        {"topic": "Main subject to analyze", "language": "Target programming language"}

        Prompt content: {{ content }}

        Variables needing descriptions: {% for var in variables %} - {{ var | trim
        }} {% endfor %}

        '
      structure:
        result:
          description: JSON object as a single string mapping variable names to descriptions
          selector:
            text: {}
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ ai_result.data.result is defined and ai_result.data.result
          | length > 0 }}'
      sequence:
      - variables:
          return_data: '{{ {''descriptions'': ai_result.data.result} }}'
    default:
    - variables:
        return_data: '{{ {''error'': ''Descriptions missing or invalid''} }}'
    - stop: Invalid model response
      response_variable: return_data
  - stop: Returning descriptions
    response_variable: return_data
play_audio:
  alias: Play Audio
  mode: parallel
  fields:
    target_player:
      description: Media player entity_id
      example: media_player.sonos_speaker
    temp_volume:
      description: Temporary volume level (0.0–1.0)
      example: 0.35
    sound_path:
      description: Media path
      example: media-source://media_source/local/sound/tech_click_2s_ver12.wav
  sequence:
  - variables:
      player: '{{ target_player | default(''media_player.sonos_speaker'') }}'
      vol: '{{ (temp_volume | float) if temp_volume is defined else 0.35 }}'
      sound: '{{ sound_path | default(''media-source://media_source/local/sound/tech_click_2s_ver12.wav'')
        }}'
      timestamp: '{{ now().timestamp() | int }}'
      scene_id: tmpvol_{{ player | replace('.', '_') }}_{{ timestamp }}
  - if: '{{ states(player) in [''unknown'', ''unavailable''] or not (0 <= vol <= 1)
      or sound == '''' }}'
    then:
    - stop: 'Invalid: player={{ states(player) }}, vol={{ vol }}, sound={{ sound }}'
  - data:
      scene_id: '{{ scene_id }}'
      snapshot_entities:
      - '{{ player }}'
    action: scene.create
  - target:
      entity_id: '{{ player }}'
    data:
      volume_level: '{{ vol }}'
    action: media_player.volume_set
  - target:
      entity_id: '{{ player }}'
    data:
      media:
        media_content_id: '{{ sound }}'
        media_content_type: '{{ ''audio/x-wav'' if ''.wav'' in sound else ''audio/mpeg''
          }}'
        metadata: {}
    action: media_player.play_media
  - wait_template: '{{ states(player) == ''playing'' }}'
    timeout: 3
    continue_on_timeout: true
  - wait_template: '{{ states(player) in [''idle'', ''paused'', ''off''] }}'
    timeout: 15
    continue_on_timeout: true
  - continue_on_error: true
    target:
      entity_id: scene.{{ scene_id }}
    action: scene.turn_on
tester_toast_notification_tester:
  alias: Tester - Toast Notification tester
  description: Tests toast behavior including edge cases for refactor validation
  sequence:
  - action: script.show_toast_notification
    data:
      message: Full parameter example
      duration: 6000
      background_color: var(--sidebar-background-color)
      text_color: var(--primary-text-color)
      border_color: rgba(255, 46, 146, 1)
      border_width: 3px
      border_radius: 16px
      padding: 14px 14px 14px 14px
      font_size: 1em
      font_weight: 400
      letter_spacing: 0.5px
      word_spacing: 1.5px
      position_bottom: 100px
      position_right: 24px
      toast_gap: 12px
      max_width: 33vw
      box_shadow: none
      icon: line-md:map-marker-alt-filled-loop
      icon_color: white
      icon_background: rgba(255, 46, 146, 1)
      icon_size: 38px
      screen_border_enabled: true
      screen_border_cutout_enabled: true
  - delay:
      milliseconds: 500
  - action: script.show_toast_notification
    data:
      message: With icon
      duration: 30000
      border_color: var(--success-color)
      icon: mdi:check
  - action: script.show_toast_notification
    data:
      message: Quick dismiss
      duration: 6000
      border_color: var(--warning-color)
      icon: line-md:speedometer-loop
  - delay:
      seconds: 1
  - action: script.show_toast_notification
    data:
      message: Default toast
  - delay:
      seconds: 1
  - action: script.show_toast_notification
    data:
      message: Long text wrapping test to demonstrate how notifications handle extended
        content without taking full screen width which would otherwise cause z-index
        overlay issues with other UI elements
      duration: 30000
      border_color: var(--blue-color)
      icon: clarity:help-info-solid
  - delay:
      seconds: 2
  - action: script.show_toast_notification
    data:
      message: Different color icon
      border_color: red
      icon: line-md:phone-call-loop
      icon_color: yellow
      duration: 30000
  - delay:
      seconds: 1
  - alias: String injection test (quotes)
    action: script.show_toast_notification
    data:
      message: Test with "quotes" and 'apostrophes'
      duration: 10000
      border_color: var(--warning-color)
  - delay:
      milliseconds: 200
  - alias: String injection test (backslashes)
    action: script.show_toast_notification
    data:
      message: 'Path test: C:\Users\Name\file.txt'
      duration: 10000
      border_color: var(--warning-color)
  - delay:
      milliseconds: 200
  - alias: String injection test (newlines)
    action: script.show_toast_notification
    data:
      message: 'Line one

        Line two

        Line three

        '
      duration: 10000
      border_color: var(--warning-color)
  - delay:
      seconds: 1
  - alias: Rapid concurrent test (overlapping max_toasts)
    repeat:
      count: 15
      sequence:
      - action: script.show_toast_notification
        data:
          message: Rapid toast {{repeat.index}}
          duration: 8000
          border_color: var(--info-color)
      - delay:
          milliseconds: 50
