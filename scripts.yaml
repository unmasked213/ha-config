        \     el.style.cssText = buildToastStyle(c, pad);\n      el.appendChild(document.createTextNode(c.msg));\n
        \     if (hasIcon) el.appendChild(createIcon(c, iconSize, protrusion));\n
        \     el.appendChild(createCloseBtn(el));\n      container.appendChild(el);\n\n
        \     scheduleBorderUpdate();\n      setupHoverPause(el, c.dur)();\n      flashBorder(c.screenBorder);\n
        \   }\n\n    return { enqueue };\n  }\n})();\n"
      user_id: '{{ user_id }}'
extract_shifts_enhy:
  alias: Extract Shifts - Enhy
  mode: single
  sequence:
  - delay:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
  - response_variable: ai_result
    data:
      task_name: shift_extraction
      instructions: 'This is a screenshot of a work rota or shift schedule app. Extract
        every visible shift. Return raw JSON only — no markdown, no explanation. Output
        format: {"shifts":[{"date":"YYYY-MM-DD","start":"HH:MM","end":"HH:MM"}]} Rules:
        1) All times 24-hour format. 2) All dates ISO YYYY-MM-DD. 3) Dates are always
        in the UK (DD/MM not MM/DD). 4) If a shift crosses midnight, end time belongs
        to the next day but keep the original start date. 5) Skip any row that is clearly
        not a scheduled shift (e.g. time-off, holiday, unavailable). 6) If no shifts
        found return {"shifts":[]}. Example: if you see "Tuesday, 17 Mar 2026 from
        12:00 PM to 8:00 PM" output {"date":"2026-03-17","start":"12:00","end":"20:00"}'
      structure:
        shifts_json:
          description: JSON shifts array
          selector:
            text: {}
      attachments:
      - media_content_id: media-source://media_source/www/rotas/latest_rota.jpg
        media_content_type: image/jpeg
    action: ai_task.generate_data
  - variables:
      raw_json: '{{ ai_result.data.shifts_json | string | trim }}'
      shifts: '{% set cleaned = raw_json | regex_replace(''```json|```'', '''') %}
        {% set start = cleaned.find(''{'') %} {% set extracted = cleaned[start:] if
        start >= 0 else ''{"shifts":[]}'' %} {% set parsed = extracted | from_json
        %} {{ parsed.shifts if ''shifts'' in parsed else [] }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ shifts | count > 0 }}'
      sequence:
      - repeat:
          for_each: '{{ shifts }}'
          sequence:
          - variables:
              shift_date: '{{ repeat.item.date }}'
              shift_start: '{{ repeat.item.start }}'
              shift_end: '{{ repeat.item.end }}'
              shift_location: '{{ repeat.item.location | default(''Work'', true) }}'
              start_datetime: '{{ (shift_date ~ '' '' ~ shift_start) | as_datetime
                }}'
              end_datetime: '{% set start_dt = (shift_date ~ '' '' ~ shift_start)
                | as_datetime %} {% set end_dt = (shift_date ~ '' '' ~ shift_end)
                | as_datetime %} {{ end_dt if end_dt > start_dt else (end_dt + timedelta(days=1))
                }}'
          - data:
              entity_id: calendar.enhy
              start_date_time: '{{ start_datetime }}'
              end_date_time: '{{ end_datetime }}'
              summary: Working at {{ shift_location }}
              description: Work shift auto-added from rota upload
            action: calendar.create_event
      - delay:
          seconds: 2
      - continue_on_error: true
        action: pyscript.cleanup_duplicate_work_events
      - action: script.show_toast_notification
        data:
          message: Rota/calendar sync success! {{ shifts | count }} shifts added
          duration: 30000
          border_color: var(--success-color)
    default:
    - action: script.show_toast_notification
      data:
        message: Rota/calendar sync failed. No shifts extracted
        duration: 30000
        border_color: var(--red-color)
