popup_climate:
  alias: Popup - Climate
  sequence:
  - service: browser_mod.popup
    data_template:
      deviceID: '{{ deviceID }}'
      card_mod:
        style:
          ha-dialog$: "div.mdc-dialog div.mdc-dialog__scrim {\n   background: rgba(0,
            0, 0, 0.6);\n   backdrop-filter: blur(8px); pointer-events: auto;\n}      \n"
      dismissable: true
      content:
        type: custom:vertical-stack-in-card
        no_card: false
        cards:
        - type: custom:swipe-card
          parameters:
            spaceBetween: 3
            effect: fade
            fadeEffect:
              crossFade: true
            slideShadows: false
            autoplay:
              delay: 5000
            speed: 1500
          cards:
          - type: custom:mini-graph-card
            entities:
            - entity: sensor.switchbot_t01_temp
              name: Ground floor
              color: cyan
            - entity: sensor.switchbot_t02_temp
              name: 1st floor
              color: var(--purple)
            - entity: sensor.switchbot_t03_temp
              name: 2nd floor
              color: var(--green)
            - entity: sensor.switchbot_meterplus_temp
              name: Cam's room
              color: var(--blue)
            name: Home temperature
            hours_to_show: 24
            card_mod:
              style: ".graph .graph__container .graph__container__svg svg g mask .line
                {\n  animation-duration: 5s !important;\n  animation-delay: 0s !important;\n
                \ animation-timing-function: linear !important;\n}    \nha-card {\n
                \ background-color: var(--blue-tint) !important;\n}\nha-card .graph
                {\n  background: transparent !important;\n}\n"
            show:
              icon: false
              name: true
              state: true
              legend: true
              fill: true
              labels: true
              graph: line
              align_state: right
              align_name: state
              icon_adaptive_color: true
              points_per_hour: 1
          - type: custom:mini-graph-card
            entities:
            - entity: sensor.switchbot_t01_humidity
              name: Ground floor
              color: cyan
            - entity: sensor.switchbot_t02_humidity
              name: 1st floor
              color: var(--purple)
            - entity: sensor.switchbot_t03_humidity
              name: 2nd floor
              color: var(--green)
            - entity: sensor.switchbot_meterplus_humidity
              name: Cam's room
              color: var(--blue)
            name: Home humidity
            hours_to_show: 24
            card_mod:
              style: ".graph .graph__container .graph__container__svg svg g mask .line
                {\n  animation-duration: 5s !important;\n  animation-delay: 0s !important;\n
                \ animation-timing-function: linear !important;\n}    \nha-card {\n
                \ background-color: var(--blue-tint) !important;\n}\nha-card .graph
                {\n  background: transparent !important;\n}\n"
            show:
              icon: false
              name: true
              state: faltruese
              legend: true
              fill: true
              labels: true
              graph: line
              align_state: right
              align_name: state
              icon_adaptive_color: true
              points_per_hour: 1
    enabled: true
  mode: single
popup_lights:
