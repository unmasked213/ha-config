show_ui_toast:
  alias: Show UI Toast
  description: Shows a toast notification using the shared UI component system. Works
    from any view via browser_mod.
  icon: mdi:message-badge-outline
  mode: parallel
  max: 10
  fields:
    message:
      description: The message to display
      required: true
      example: Activity detected
      selector:
        text:
    icon:
      description: MDI icon name (e.g., mdi:motion-sensor)
      required: false
      example: mdi:check
      selector:
        icon:
    duration:
      description: Time in milliseconds before auto-dismiss
      required: false
      default: 6000
      example: 5000
      selector:
        number:
          min: 1000
          max: 30000
          unit_of_measurement: ms
    color:
      description: CSS color for border and icon (e.g., hsl(200, 70%, 50%))
      required: false
      example: hsl(200, 70%, 50%)
      selector:
        text:
  variables:
    msg: '{{ message | default('''') }}'
    icn: '{{ icon | default('''') }}'
    dur: '{{ duration | default(6000) }}'
    clr: '{{ color | default('''') }}'
  sequence:
  - action: browser_mod.javascript
    data:
      code: "(async () => {\n  const { showToast } = await import('/local/base/toasts.js');\n
        \ showToast({\n    message: {{ msg | tojson }},\n    icon: {{ icn | tojson
        }},\n    color: {{ clr | tojson }},\n    duration: Number({{ dur }})\n  });\n})();\n"
      user_id: '{{ user_id | default(''person.apple'') }}'
